# =============================================================================
# COINET PLATFORM - ANALYTICS & EVENT STREAMING STACK
# =============================================================================
# Complete analytics infrastructure with Kafka, ClickHouse, and TimescaleDB
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # APACHE KAFKA - EVENT STREAMING
  # =============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: coinet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - coinet-analytics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: coinet-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9997:9997"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # JMX for monitoring
      KAFKA_JMX_PORT: 9997
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - coinet-analytics
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # CLICKHOUSE - ANALYTICS DATABASE
  # =============================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: coinet-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: coinet_analytics
      CLICKHOUSE_USER: coinet_analytics
      CLICKHOUSE_PASSWORD: clickhouse_password_2024
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./analytics/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./analytics/clickhouse/users.xml:/etc/clickhouse-server/users.xml
    networks:
      - coinet-analytics
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # TIMESCALEDB - TIME SERIES DATABASE
  # =============================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: coinet-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: coinet_timeseries
      POSTGRES_USER: coinet_timeseries
      POSTGRES_PASSWORD: timescale_password_2024
      TIMESCALEDB_TELEMETRY: 'off'
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./analytics/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - coinet-analytics
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinet_timeseries -d coinet_timeseries"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # KAFKA CONNECT - DATA PIPELINE
  # =============================================================================
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.4.0
    container_name: coinet-kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: coinet-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: coinet-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: coinet-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: coinet-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    volumes:
      - ./analytics/kafka-connect/connectors:/etc/kafka-connect/connectors
    networks:
      - coinet-analytics
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # KAFKA UI - MANAGEMENT INTERFACE
  # =============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: coinet-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: coinet-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_READONLY: 'false'
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: coinet-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - coinet-analytics
    restart: unless-stopped

  # =============================================================================
  # ANALYTICS PROCESSORS
  # =============================================================================
  
  # Real-time analytics processor
  analytics-processor:
    build:
      context: .
      dockerfile: services/analytics-processor/Dockerfile
    container_name: coinet-analytics-processor
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:29092
      - CLICKHOUSE_URL=http://clickhouse:8123
      - TIMESCALEDB_URL=postgresql://coinet_timeseries:timescale_password_2024@timescaledb:5432/coinet_timeseries
      - KAFKA_ENABLED=true
      - CLICKHOUSE_ENABLED=true
      - TIMESCALEDB_ENABLED=true
    networks:
      - coinet-analytics
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Stream processor for real-time aggregations
  stream-processor:
    build:
      context: .
      dockerfile: services/stream-processor/Dockerfile
    container_name: coinet-stream-processor
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - KAFKA_ENABLED=true
      - PROCESSING_ENABLED=true
    networks:
      - coinet-analytics
      - default
    restart: unless-stopped

volumes:
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  clickhouse-data:
    driver: local
  timescaledb-data:
    driver: local

networks:
  coinet-analytics:
    driver: bridge
    name: coinet-analytics
