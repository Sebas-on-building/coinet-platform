# =============================================================================
# COINET AI SERVICES - HELM VALUES
# =============================================================================

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# Service configurations
services:
  ingest:
    enabled: true
    name: ingest-service
    image:
      repository: coinet-ai/ingest-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8001
    replicas: 2
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    env:
      LOG_LEVEL: "info"
      NODE_ENV: "production"

  context:
    enabled: true
    name: context-service
    image:
      repository: coinet-ai/context-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8002
    replicas: 2
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    env:
      LOG_LEVEL: "info"
      NODE_ENV: "production"

  inference:
    enabled: true
    name: inference-service
    image:
      repository: coinet-ai/inference-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8003
    replicas: 3
    resources:
      requests:
        memory: "1Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
    env:
      LOG_LEVEL: "info"
      NODE_ENV: "production"

  feedback:
    enabled: true
    name: feedback-service
    image:
      repository: coinet-ai/feedback-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8004
    replicas: 2
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    env:
      LOG_LEVEL: "info"
      NODE_ENV: "production"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.coinet.ai
      paths:
        - path: /ingest
          pathType: Prefix
          service: ingest-service
        - path: /context
          pathType: Prefix
          service: context-service
        - path: /inference
          pathType: Prefix
          service: inference-service
        - path: /feedback
          pathType: Prefix
          service: feedback-service
  tls:
    - secretName: coinet-ai-tls
      hosts:
        - api.coinet.ai

# Database configuration
database:
  postgresql:
    enabled: true
    host: "postgresql.default.svc.cluster.local"
    port: 5432
    database: "coinet_ai"
    existingSecret: "postgresql-secret"
    
  redis:
    enabled: true
    host: "redis.default.svc.cluster.local"
    port: 6379
    existingSecret: "redis-secret"

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      prometheus: "kube-prometheus"

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Node affinity
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/part-of
            operator: In
            values:
            - coinet-ai
        topologyKey: kubernetes.io/hostname 