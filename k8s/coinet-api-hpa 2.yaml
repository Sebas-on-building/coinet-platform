apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coinet-api-hpa
  labels:
    app: coinet-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coinet-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70 