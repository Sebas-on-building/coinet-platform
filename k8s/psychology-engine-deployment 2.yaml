apiVersion: v1
kind: Namespace
metadata:
  name: coinet-ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: psychology-engine
  namespace: coinet-ai
  labels:
    app: psychology-engine
    component: ai-services
    version: v1.0.0
spec:
  replicas: 3  # Start with 3 replicas for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployment
  selector:
    matchLabels:
      app: psychology-engine
  template:
    metadata:
      labels:
        app: psychology-engine
        component: ai-services
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: psychology-engine
        image: coinet/psychology-engine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PSYCHOLOGY_ENGINE_VERSION
          value: "1.0.0"
        - name: DIVINE_MODE
          value: "ENABLED"
        - name: LOG_LEVEL
          value: "INFO"
        - name: MAX_WORKERS
          value: "4"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: models-cache
          mountPath: /app/models
      volumes:
      - name: models-cache
        emptyDir:
          sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: psychology-engine-service
  namespace: coinet-ai
  labels:
    app: psychology-engine
spec:
  type: ClusterIP
  selector:
    app: psychology-engine
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: psychology-engine-hpa
  namespace: coinet-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: psychology-engine
  minReplicas: 3
  maxReplicas: 20  # Scale up to 20 pods under load
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100  # Double pods every 60 seconds if needed
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50  # Remove 50% of pods
        periodSeconds: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: psychology-engine-ingress
  namespace: coinet-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/rate-limit: "100"  # 100 requests per minute per IP
spec:
  tls:
  - hosts:
    - psychology.coinet.ai
    secretName: psychology-engine-tls
  rules:
  - host: psychology.coinet.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: psychology-engine-service
            port:
              number: 80
