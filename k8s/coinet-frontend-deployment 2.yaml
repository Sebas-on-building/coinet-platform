apiVersion: apps/v1
kind: Deployment
metadata:
  name: coinet-frontend
  labels:
    app: coinet-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coinet-frontend
  template:
    metadata:
      labels:
        app: coinet-frontend
    spec:
      containers:
        - name: frontend
          image: coinet/frontend:${TAG-latest}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: coinet-config
                  key: API_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5 