# ConfigMap for connection pool settings and database configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: timescaledb-connection-config
  namespace: default
  labels:
    app: timescaledb
    component: database
data:
  # Connection pool settings
  connection-pool.conf: |
    # Connection pool settings for different services
    max_connections_per_service=20
    idle_timeout=300
    max_lifetime=1800
    health_check_period=30
    
    # Service-specific pool sizes
    ingest_service_pool_size=10
    context_service_pool_size=5
    analytics_service_pool_size=15
    stream_processor_pool_size=8
  
  # Database connection parameters
  database.conf: |
    # Connection parameters
    connect_timeout=10
    statement_timeout=30000
    idle_in_transaction_session_timeout=60000
    
    # SSL settings
    ssl_prefer_server_ciphers=on
    ssl_protocols=TLSv1.2,TLSv1.3
    
    # Application settings
    application_name_prefix=coinet-
    timezone=UTC
    search_path=market_data,social_data,news_data,onchain_data,analytics,public
  
  # Monitoring configuration
  monitoring.conf: |
    # Monitoring settings
    enable_pg_stat_statements=true
    track_activity_query_size=2048
    track_functions=all
    track_io_timing=on
    
    # Performance monitoring
    log_min_duration_statement=1000
    log_statement_stats=off
    log_parser_stats=off
    log_planner_stats=off
    log_executor_stats=off 