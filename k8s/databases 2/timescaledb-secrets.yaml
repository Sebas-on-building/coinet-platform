---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timescaledb-config
  namespace: default
  labels:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/instance: coinet-timescaledb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: coinet-ai
data:
  # Database configuration
  POSTGRES_DB: "coinet_timeseries"
  POSTGRES_USER: "coinet"
  
  # TimescaleDB settings
  TIMESCALEDB_TELEMETRY: "off"
  TS_TUNE_MEMORY: "1GB"
  TS_TUNE_NUM_CPUS: "2"
  
  # Connection settings
  PGPORT: "5432"
  PGHOST: "timescaledb"
  
  # Performance settings
  shared_buffers: "256MB"
  effective_cache_size: "1GB"
  maintenance_work_mem: "64MB"
  max_connections: "200"
  
  # Time-series specific settings
  timescaledb_max_background_workers: "8"
  max_background_workers: "16"
  max_worker_processes: "16"

