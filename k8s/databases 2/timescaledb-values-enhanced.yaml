# =============================================================================
# COINET AI TIMESCALEDB HELM VALUES - ENHANCED INTEGRATION
# Production-ready PostgreSQL with TimescaleDB for time-series crypto data
# =============================================================================

# Global configuration
global:
  storageClass: "fast-ssd"
  postgresql:
    auth:
      postgresPassword: "timescale-admin-2024!"
      database: "coinet_timeseries"

# TimescaleDB configuration
image:
  repository: "timescale/timescaledb-ha"
  tag: "pg15-latest"
  pullPolicy: IfNotPresent

# Authentication
auth:
  postgresPassword: "timescale-admin-2024!"
  username: "coinet_user"
  password: "coinet-db-2024!"
  database: "coinet_timeseries"
  existingSecret: ""

# PostgreSQL configuration optimized for time-series workloads
postgresql:
  # Performance tuning for time-series data
  pgConfig:
    shared_preload_libraries: "timescaledb"
    max_connections: "200"
    shared_buffers: "256MB"
    effective_cache_size: "1GB"
    maintenance_work_mem: "64MB"
    checkpoint_completion_target: "0.9"
    wal_buffers: "16MB"
    default_statistics_target: "100"
    random_page_cost: "1.1"
    effective_io_concurrency: "200"
    work_mem: "4MB"
    min_wal_size: "1GB"
    max_wal_size: "4GB"
    
    # TimescaleDB specific settings
    timescaledb.max_background_workers: "8"
    timescaledb.telemetry_level: "off"
    
    # Logging configuration
    log_statement: "all"
    log_min_duration_statement: "1000"
    log_line_prefix: "%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
    
  # Custom PostgreSQL configuration
  customConfig: |
    # Additional TimescaleDB optimizations
    listen_addresses = '*'
    port = 5432
    
    # Memory settings for crypto data workloads
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    
    # WAL configuration for high-write workloads
    wal_level = replica
    max_wal_senders = 3
    wal_keep_size = 1GB
    
    # Background writer tuning
    bgwriter_delay = 200ms
    bgwriter_lru_maxpages = 100
    bgwriter_lru_multiplier = 2.0
    
    # Checkpoint tuning
    checkpoint_timeout = 5min
    checkpoint_completion_target = 0.9
    checkpoint_warning = 30s

# Persistence configuration
persistence:
  enabled: true
  storageClass: "fast-ssd"
  size: 100Gi
  accessModes:
    - ReadWriteOnce
  annotations:
    volume.beta.kubernetes.io/storage-class: "fast-ssd"

# Resource configuration
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi
    cpu: 1000m

# Service configuration
service:
  type: ClusterIP
  port: 5432
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"

# Replication configuration for HA
replication:
  enabled: true
  readReplicas: 2
  readReplicaResources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: "7d"
  storageClass: "standard"
  size: "50Gi"

# Metrics and monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: "monitoring"
    labels:
      app: timescaledb
      component: database
  prometheusRule:
    enabled: true
    rules:
      - alert: TimescaleDBDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "TimescaleDB is down"
      - alert: TimescaleDBHighConnections
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TimescaleDB high connection usage"

# Security context
securityContext:
  enabled: true
  fsGroup: 999
  runAsUser: 999
  runAsNonRoot: true

# Pod security
podSecurityContext:
  enabled: true
  fsGroup: 999
  runAsUser: 999
  runAsNonRoot: true

# Health checks
probes:
  readiness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

# Pod management
podManagementPolicy: OrderedReady
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Node affinity and tolerations
nodeSelector:
  kubernetes.io/os: linux

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - timescaledb
        topologyKey: kubernetes.io/hostname

tolerations:
  - key: "database-workload"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

# Pod annotations and labels
podLabels:
  app: timescaledb
  component: database
  version: enhanced

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9187"
  prometheus.io/path: "/metrics"

# Network policy
networkPolicy:
  enabled: true
  allowedNamespaces:
    - default
    - coinet-dev
    - coinet-staging
    - coinet-production
  allowedPorts:
    - 5432

# Custom initialization scripts
initScripts:
  01-extensions.sql: |
    -- Enable TimescaleDB extension
    CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
    
    -- Enable additional extensions for crypto data analysis
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    CREATE EXTENSION IF NOT EXISTS "pg_stat_statements";
    CREATE EXTENSION IF NOT EXISTS "btree_gin";
    CREATE EXTENSION IF NOT EXISTS "btree_gist";

  02-schemas.sql: |
    -- Create schemas for different data types
    CREATE SCHEMA IF NOT EXISTS market_data;
    CREATE SCHEMA IF NOT EXISTS social_data;
    CREATE SCHEMA IF NOT EXISTS news_data;
    CREATE SCHEMA IF NOT EXISTS onchain_data;
    CREATE SCHEMA IF NOT EXISTS analytics;
    
    -- Grant permissions
    GRANT USAGE ON SCHEMA market_data TO coinet_user;
    GRANT USAGE ON SCHEMA social_data TO coinet_user;
    GRANT USAGE ON SCHEMA news_data TO coinet_user;
    GRANT USAGE ON SCHEMA onchain_data TO coinet_user;
    GRANT USAGE ON SCHEMA analytics TO coinet_user;

  03-tables.sql: |
    -- Market data tables optimized for time-series
    CREATE TABLE IF NOT EXISTS market_data.price_candles (
      time TIMESTAMPTZ NOT NULL,
      symbol TEXT NOT NULL,
      exchange TEXT NOT NULL,
      open DECIMAL(20,8) NOT NULL,
      high DECIMAL(20,8) NOT NULL,
      low DECIMAL(20,8) NOT NULL,
      close DECIMAL(20,8) NOT NULL,
      volume DECIMAL(20,8) NOT NULL,
      quote_volume DECIMAL(20,8),
      trade_count INTEGER,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    -- Convert to hypertable
    SELECT create_hypertable('market_data.price_candles', 'time', 
      chunk_time_interval => INTERVAL '1 hour',
      if_not_exists => TRUE
    );
    
    -- Order book snapshots
    CREATE TABLE IF NOT EXISTS market_data.order_book_snapshots (
      time TIMESTAMPTZ NOT NULL,
      symbol TEXT NOT NULL,
      exchange TEXT NOT NULL,
      bids JSONB NOT NULL,
      asks JSONB NOT NULL,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    SELECT create_hypertable('market_data.order_book_snapshots', 'time',
      chunk_time_interval => INTERVAL '30 minutes',
      if_not_exists => TRUE
    );
    
    -- Social sentiment data
    CREATE TABLE IF NOT EXISTS social_data.sentiment_scores (
      time TIMESTAMPTZ NOT NULL,
      platform TEXT NOT NULL,
      coin_symbol TEXT NOT NULL,
      sentiment_score DECIMAL(5,4),
      mention_count INTEGER,
      engagement_score INTEGER,
      source_url TEXT,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    SELECT create_hypertable('social_data.sentiment_scores', 'time',
      chunk_time_interval => INTERVAL '1 hour',
      if_not_exists => TRUE
    );
    
    -- News impact analysis
    CREATE TABLE IF NOT EXISTS news_data.news_impact (
      time TIMESTAMPTZ NOT NULL,
      title TEXT NOT NULL,
      content TEXT,
      source TEXT NOT NULL,
      coins_mentioned TEXT[],
      sentiment_score DECIMAL(5,4),
      impact_score DECIMAL(5,4),
      url TEXT,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    SELECT create_hypertable('news_data.news_impact', 'time',
      chunk_time_interval => INTERVAL '2 hours',
      if_not_exists => TRUE
    );
    
    -- On-chain metrics
    CREATE TABLE IF NOT EXISTS onchain_data.network_metrics (
      time TIMESTAMPTZ NOT NULL,
      chain TEXT NOT NULL,
      metric_name TEXT NOT NULL,
      metric_value DECIMAL(30,8),
      unit TEXT,
      block_height BIGINT,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    
    SELECT create_hypertable('onchain_data.network_metrics', 'time',
      chunk_time_interval => INTERVAL '1 hour',
      if_not_exists => TRUE
    );

  04-indexes.sql: |
    -- Performance indexes for common queries
    CREATE INDEX IF NOT EXISTS idx_price_candles_symbol_time 
    ON market_data.price_candles (symbol, time DESC);
    
    CREATE INDEX IF NOT EXISTS idx_price_candles_exchange_symbol 
    ON market_data.price_candles (exchange, symbol, time DESC);
    
    CREATE INDEX IF NOT EXISTS idx_orderbook_symbol_time 
    ON market_data.order_book_snapshots (symbol, time DESC);
    
    CREATE INDEX IF NOT EXISTS idx_sentiment_coin_time 
    ON social_data.sentiment_scores (coin_symbol, time DESC);
    
    CREATE INDEX IF NOT EXISTS idx_sentiment_platform_time 
    ON social_data.sentiment_scores (platform, time DESC);
    
    CREATE INDEX IF NOT EXISTS idx_news_impact_time 
    ON news_data.news_impact (time DESC);
    
    CREATE INDEX IF NOT EXISTS idx_news_coins_mentioned 
    ON news_data.news_impact USING GIN (coins_mentioned);
    
    CREATE INDEX IF NOT EXISTS idx_network_metrics_chain_metric 
    ON onchain_data.network_metrics (chain, metric_name, time DESC);

  05-functions.sql: |
    -- Utility functions for crypto data analysis
    CREATE OR REPLACE FUNCTION get_latest_price(p_symbol TEXT, p_exchange TEXT DEFAULT 'binance')
    RETURNS DECIMAL(20,8) AS $$
    BEGIN
      RETURN (
        SELECT close 
        FROM market_data.price_candles 
        WHERE symbol = p_symbol AND exchange = p_exchange 
        ORDER BY time DESC 
        LIMIT 1
      );
    END;
    $$ LANGUAGE plpgsql;
    
    CREATE OR REPLACE FUNCTION calculate_price_change(
      p_symbol TEXT, 
      p_exchange TEXT DEFAULT 'binance',
      p_period INTERVAL DEFAULT '24 hours'
    )
    RETURNS DECIMAL(10,4) AS $$
    DECLARE
      current_price DECIMAL(20,8);
      previous_price DECIMAL(20,8);
    BEGIN
      -- Get current price
      SELECT close INTO current_price
      FROM market_data.price_candles 
      WHERE symbol = p_symbol AND exchange = p_exchange 
      ORDER BY time DESC 
      LIMIT 1;
      
      -- Get price from specified period ago
      SELECT close INTO previous_price
      FROM market_data.price_candles 
      WHERE symbol = p_symbol AND exchange = p_exchange 
        AND time <= NOW() - p_period
      ORDER BY time DESC 
      LIMIT 1;
      
      IF previous_price IS NULL OR previous_price = 0 THEN
        RETURN NULL;
      END IF;
      
      RETURN ((current_price - previous_price) / previous_price * 100);
    END;
    $$ LANGUAGE plpgsql;
    
    CREATE OR REPLACE FUNCTION get_average_sentiment(
      p_coin_symbol TEXT,
      p_platform TEXT DEFAULT NULL,
      p_period INTERVAL DEFAULT '24 hours'
    )
    RETURNS DECIMAL(5,4) AS $$
    BEGIN
      RETURN (
        SELECT AVG(sentiment_score)
        FROM social_data.sentiment_scores
        WHERE coin_symbol = p_coin_symbol
          AND time >= NOW() - p_period
          AND (p_platform IS NULL OR platform = p_platform)
      );
    END;
    $$ LANGUAGE plpgsql;

  06-users.sql: |
    -- Create application users with specific permissions
    CREATE USER coinet_analytics WITH PASSWORD 'analytics-2024!';
    CREATE USER coinet_ingest WITH PASSWORD 'ingest-2024!';
    CREATE USER coinet_context WITH PASSWORD 'context-2024!';
    
    -- Grant schema permissions
    GRANT USAGE ON SCHEMA market_data TO coinet_analytics, coinet_ingest, coinet_context;
    GRANT USAGE ON SCHEMA social_data TO coinet_analytics, coinet_ingest, coinet_context;
    GRANT USAGE ON SCHEMA news_data TO coinet_analytics, coinet_ingest, coinet_context;
    GRANT USAGE ON SCHEMA onchain_data TO coinet_analytics, coinet_ingest, coinet_context;
    GRANT USAGE ON SCHEMA analytics TO coinet_analytics, coinet_ingest, coinet_context;
    
    -- Table permissions for analytics user (read-only)
    GRANT SELECT ON ALL TABLES IN SCHEMA market_data TO coinet_analytics;
    GRANT SELECT ON ALL TABLES IN SCHEMA social_data TO coinet_analytics;
    GRANT SELECT ON ALL TABLES IN SCHEMA news_data TO coinet_analytics;
    GRANT SELECT ON ALL TABLES IN SCHEMA onchain_data TO coinet_analytics;
    
    -- Table permissions for ingest user (read/write)
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA market_data TO coinet_ingest;
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA social_data TO coinet_ingest;
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA news_data TO coinet_ingest;
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA onchain_data TO coinet_ingest;
    
    -- Table permissions for context user (read-only)
    GRANT SELECT ON ALL TABLES IN SCHEMA market_data TO coinet_context;
    GRANT SELECT ON ALL TABLES IN SCHEMA social_data TO coinet_context;
    GRANT SELECT ON ALL TABLES IN SCHEMA news_data TO coinet_context;
    GRANT SELECT ON ALL TABLES IN SCHEMA onchain_data TO coinet_context;
    
    -- Function permissions
    GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA public TO coinet_analytics, coinet_ingest, coinet_context;
    
    -- Default privileges for future objects
    ALTER DEFAULT PRIVILEGES IN SCHEMA market_data GRANT SELECT ON TABLES TO coinet_analytics, coinet_context;
    ALTER DEFAULT PRIVILEGES IN SCHEMA social_data GRANT SELECT ON TABLES TO coinet_analytics, coinet_context;
    ALTER DEFAULT PRIVILEGES IN SCHEMA news_data GRANT SELECT ON TABLES TO coinet_analytics, coinet_context;
    ALTER DEFAULT PRIVILEGES IN SCHEMA onchain_data GRANT SELECT ON TABLES TO coinet_analytics, coinet_context;
    
    ALTER DEFAULT PRIVILEGES IN SCHEMA market_data GRANT SELECT, INSERT, UPDATE ON TABLES TO coinet_ingest;
    ALTER DEFAULT PRIVILEGES IN SCHEMA social_data GRANT SELECT, INSERT, UPDATE ON TABLES TO coinet_ingest;
    ALTER DEFAULT PRIVILEGES IN SCHEMA news_data GRANT SELECT, INSERT, UPDATE ON TABLES TO coinet_ingest;
    ALTER DEFAULT PRIVILEGES IN SCHEMA onchain_data GRANT SELECT, INSERT, UPDATE ON TABLES TO coinet_ingest; 