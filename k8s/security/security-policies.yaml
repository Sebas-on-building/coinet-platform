# =============================================================================
# COINET PLATFORM - KUBERNETES SECURITY POLICIES
# =============================================================================
# Comprehensive security policies including Pod Security Standards,
# Network Policies, RBAC, and security constraints for the Coinet platform
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: coinet-platform
  labels:
    name: coinet-platform
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    security.coinet.ai/tier: production
    network-policy: enabled

---
# =============================================================================
# POD SECURITY STANDARDS - RESTRICTED PROFILE
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: coinet-resource-limits
  namespace: coinet-platform
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "100Mi"
    max:
      cpu: "2"
      memory: "4Gi"
      ephemeral-storage: "10Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
      ephemeral-storage: "50Mi"
  - type: Pod
    max:
      cpu: "4"
      memory: "8Gi"
      ephemeral-storage: "20Gi"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: coinet-resource-quota
  namespace: coinet-platform
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    requests.storage: "100Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    secrets: "50"
    configmaps: "50"

---
# =============================================================================
# NETWORK POLICIES - MICRO-SEGMENTATION
# =============================================================================

# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: coinet-platform
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# API Gateway Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: coinet-platform
spec:
  podSelector:
    matchLabels:
      app: coinet-api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from load balancer and monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: coinet-monitoring
    ports:
    - protocol: TCP
      port: 8000
  # Allow health checks from Kubernetes
  - from: []
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow egress to all Coinet services
  - to:
    - podSelector:
        matchLabels:
          tier: core
    ports:
    - protocol: TCP
      port: 8005  # User Service
    - protocol: TCP
      port: 8001  # Auth Service
  - to:
    - podSelector:
        matchLabels:
          tier: data
    ports:
    - protocol: TCP
      port: 8004  # Data Service
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS for external APIs
  - to: []
    ports:
    - protocol: TCP
      port: 443

---
# User Service Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-network-policy
  namespace: coinet-platform
spec:
  podSelector:
    matchLabels:
      app: coinet-user-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from API Gateway only
  - from:
    - podSelector:
        matchLabels:
          app: coinet-api-gateway
    ports:
    - protocol: TCP
      port: 8005
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: coinet-monitoring
    ports:
    - protocol: TCP
      port: 8005
  egress:
  # Allow egress to databases
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow Sentry reporting
  - to: []
    ports:
    - protocol: TCP
      port: 443

---
# Database Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-network-policy
  namespace: coinet-platform
spec:
  podSelector:
    matchLabels:
      component: database
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from Coinet services only
  - from:
    - podSelector:
        matchLabels:
          tier: core
    - podSelector:
        matchLabels:
          tier: data
    - podSelector:
        matchLabels:
          tier: ai
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: coinet-monitoring
  egress:
  # Allow DNS resolution only
  - to: []
    ports:
    - protocol: UDP
      port: 53

---
# =============================================================================
# RBAC - ROLE-BASED ACCESS CONTROL
# =============================================================================

# Coinet Platform Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coinet-platform-sa
  namespace: coinet-platform
  labels:
    app: coinet-platform
    component: rbac
automountServiceAccountToken: true

---
# Coinet Platform Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coinet-platform-role
  namespace: coinet-platform
rules:
# Pod management
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status"]
  verbs: ["get", "list", "watch"]
# Service management
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
# ConfigMap and Secret access (limited)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["coinet-secrets", "coinet-tls-certs"]
# Events for debugging
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

---
# Bind role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coinet-platform-binding
  namespace: coinet-platform
subjects:
- kind: ServiceAccount
  name: coinet-platform-sa
  namespace: coinet-platform
roleRef:
  kind: Role
  name: coinet-platform-role
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# SECURITY CONTEXT CONSTRAINTS
# =============================================================================
apiVersion: v1
kind: SecurityContextConstraints
metadata:
  name: coinet-restricted-scc
  labels:
    app: coinet-platform
    security-tier: restricted
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: false
allowedCapabilities: null
defaultAddCapabilities: null
requiredDropCapabilities:
- ALL
allowedFlexVolumes: null
allowedUnsafeSysctls: null
defaultAllowPrivilegeEscalation: false
forbiddenSysctls:
- "*"
fsGroup:
  type: MustRunAs
  ranges:
  - min: 1000
    max: 65535
readOnlyRootFilesystem: true
runAsUser:
  type: MustRunAsNonRoot
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: MustRunAs
  ranges:
  - min: 1000
    max: 65535
users:
- system:serviceaccount:coinet-platform:coinet-platform-sa
volumes:
- configMap
- secret
- emptyDir
- persistentVolumeClaim
- projected

---
# =============================================================================
# POD DISRUPTION BUDGETS
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coinet-api-gateway-pdb
  namespace: coinet-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: coinet-api-gateway

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coinet-user-service-pdb
  namespace: coinet-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: coinet-user-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coinet-databases-pdb
  namespace: coinet-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      component: database

---
# =============================================================================
# ADMISSION CONTROLLERS & POLICIES
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: coinet-security-policy
  labels:
    app: coinet-platform
    security-tier: enterprise
spec:
  validationFailureAction: enforce
  background: true
  rules:
  # Require security context
  - name: require-security-context
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Security context is required"
      pattern:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: ">999"
            fsGroup: ">999"

  # Require resource limits
  - name: require-resource-limits
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Resource limits are required"
      pattern:
        spec:
          containers:
          - name: "*"
            resources:
              limits:
                memory: "?*"
                cpu: "?*"
              requests:
                memory: "?*"
                cpu: "?*"

  # Require readiness and liveness probes
  - name: require-probes
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Liveness and readiness probes are required"
      pattern:
        spec:
          containers:
          - name: "*"
            livenessProbe:
              httpGet:
                path: "?*"
                port: "?*"
            readinessProbe:
              httpGet:
                path: "?*"
                port: "?*"

  # Disallow privileged containers
  - name: disallow-privileged
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Privileged containers are not allowed"
      pattern:
        spec:
          =(securityContext):
            =(privileged): "false"
          containers:
          - name: "*"
            =(securityContext):
              =(privileged): "false"

---
# =============================================================================
# IMAGE SECURITY POLICY
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: coinet-image-security
  labels:
    app: coinet-platform
    security-component: image-policy
spec:
  validationFailureAction: enforce
  background: true
  rules:
  # Require specific image registries
  - name: allowed-registries
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Images must be from approved registries"
      pattern:
        spec:
          containers:
          - name: "*"
            image: "registry.coinet.ai/* | docker.io/library/* | gcr.io/distroless/* | docker.io/node:* | postgres:* | redis:*"

  # Disallow latest tags
  - name: disallow-latest-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Latest tag is not allowed"
      pattern:
        spec:
          containers:
          - name: "*"
            image: "!*:latest"

  # Require image vulnerability scanning
  - name: require-scanned-images
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Images must be scanned for vulnerabilities"
      pattern:
        metadata:
          annotations:
            security.coinet.ai/image-scanned: "true"
