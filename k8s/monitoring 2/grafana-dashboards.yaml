# =============================================================================
# COINET PLATFORM - GRAFANA DASHBOARDS CONFIGURATION
# =============================================================================
# Comprehensive Grafana dashboards for monitoring the entire Coinet platform
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: coinet-platform-dashboard
  namespace: coinet-monitoring
  labels:
    grafana_dashboard: "1"
    app: grafana
    component: dashboard
data:
  coinet-platform-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Coinet Platform Overview",
        "tags": ["coinet", "platform", "overview"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Platform Health Status",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=~\"coinet-.*\"}",
                "legendFormat": "{{ service }}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0},
                    {"color": "green", "value": 1}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Request Rate (RPS)",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(coinet_gateway_requests_total[5m])) by (service)",
                "legendFormat": "{{ service }}"
              }
            ],
            "yAxes": [
              {"label": "Requests/sec", "min": 0}
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 3,
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(coinet_gateway_requests_total{status=~\"4..|5..\"}[5m])) by (service, status)",
                "legendFormat": "{{ service }} ({{ status }})"
              }
            ],
            "yAxes": [
              {"label": "Errors/sec", "min": 0}
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 4,
            "title": "Response Time (95th percentile)",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(coinet_gateway_request_duration_seconds_bucket[5m])) by (le, service))",
                "legendFormat": "{{ service }}"
              }
            ],
            "yAxes": [
              {"label": "Seconds", "min": 0}
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coinet-user-service-dashboard
  namespace: coinet-monitoring
  labels:
    grafana_dashboard: "1"
    app: grafana
    component: dashboard
data:
  coinet-user-service.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Coinet User Service",
        "tags": ["coinet", "user-service", "authentication"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Authentication Metrics",
            "type": "stat",
            "targets": [
              {
                "expr": "coinet_user_registrations_total",
                "legendFormat": "Total Registrations"
              },
              {
                "expr": "coinet_user_logins_total",
                "legendFormat": "Total Logins"
              },
              {
                "expr": "coinet_user_failed_logins_total",
                "legendFormat": "Failed Logins"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Active Users",
            "type": "graph",
            "targets": [
              {
                "expr": "coinet_user_active_sessions",
                "legendFormat": "Active Sessions"
              },
              {
                "expr": "coinet_user_registered_users",
                "legendFormat": "Total Users"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}
          },
          {
            "id": 3,
            "title": "Security Features",
            "type": "piechart",
            "targets": [
              {
                "expr": "coinet_user_2fa_enabled_users",
                "legendFormat": "2FA Enabled"
              },
              {
                "expr": "coinet_user_verified_users",
                "legendFormat": "Email Verified"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}
          },
          {
            "id": 4,
            "title": "Login Success Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(coinet_user_logins_total[5m]) / (rate(coinet_user_logins_total[5m]) + rate(coinet_user_failed_logins_total[5m])) * 100",
                "legendFormat": "Success Rate %"
              }
            ],
            "yAxes": [
              {"label": "Percentage", "min": 0, "max": 100}
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 5,
            "title": "API Key Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "coinet_user_api_keys_created_total",
                "legendFormat": "API Keys Created"
              },
              {
                "expr": "coinet_user_api_keys_active",
                "legendFormat": "Active API Keys"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          },
          {
            "id": 6,
            "title": "Database Operations",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(coinet_user_db_operations_total[5m])",
                "legendFormat": "{{ operation }}"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16}
          }
        ],
        "time": {
          "from": "now-6h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coinet-api-gateway-dashboard
  namespace: coinet-monitoring
  labels:
    grafana_dashboard: "1"
    app: grafana
    component: dashboard
data:
  coinet-api-gateway.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Coinet API Gateway",
        "tags": ["coinet", "api-gateway", "routing"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Gateway Performance",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(coinet_gateway_requests_total[5m])",
                "legendFormat": "{{ method }} {{ path }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Service Health",
            "type": "heatmap",
            "targets": [
              {
                "expr": "coinet_gateway_service_health",
                "legendFormat": "{{ service }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 3,
            "title": "Circuit Breaker Status",
            "type": "table",
            "targets": [
              {
                "expr": "coinet_gateway_circuit_breaker_state",
                "legendFormat": "{{ service }}"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
          },
          {
            "id": 4,
            "title": "Cache Hit Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "coinet_gateway_cache_hits_total / (coinet_gateway_cache_hits_total + coinet_gateway_cache_misses_total) * 100",
                "legendFormat": "Cache Hit Rate"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}
          },
          {
            "id": 5,
            "title": "Rate Limiting",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(coinet_gateway_rate_limit_exceeded_total[5m])",
                "legendFormat": "Rate Limited Requests"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "15s"
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coinet-infrastructure-dashboard
  namespace: coinet-monitoring
  labels:
    grafana_dashboard: "1"
    app: grafana
    component: dashboard
data:
  coinet-infrastructure.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Coinet Infrastructure",
        "tags": ["coinet", "infrastructure", "kubernetes"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Pod Resource Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{pod=~\"coinet-.*\"}) by (pod)",
                "legendFormat": "{{ pod }} Memory"
              },
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"coinet-.*\"}[5m])) by (pod) * 100",
                "legendFormat": "{{ pod }} CPU %"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Database Metrics",
            "type": "graph",
            "targets": [
              {
                "expr": "postgresql_connections_active",
                "legendFormat": "Active Connections"
              },
              {
                "expr": "rate(postgresql_queries_total[5m])",
                "legendFormat": "Queries/sec"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 3,
            "title": "Redis Metrics",
            "type": "graph",
            "targets": [
              {
                "expr": "redis_connected_clients",
                "legendFormat": "Connected Clients"
              },
              {
                "expr": "rate(redis_commands_processed_total[5m])",
                "legendFormat": "Commands/sec"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          }
        ],
        "time": {
          "from": "now-2h",
          "to": "now"
        },
        "refresh": "1m"
      }
    }
