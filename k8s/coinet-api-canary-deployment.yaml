apiVersion: apps/v1
kind: Deployment
metadata:
  name: coinet-api-canary
  labels:
    app: coinet-api
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coinet-api
      track: canary
  template:
    metadata:
      labels:
        app: coinet-api
        track: canary
    spec:
      containers:
        - name: api
          image: coinet/api:${CANARY_TAG-latest}
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: coinet-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5 