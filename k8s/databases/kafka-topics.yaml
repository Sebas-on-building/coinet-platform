# =============================================================================
# COINET AI KAFKA TOPICS
# Topic definitions for real-time data streaming architecture
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-topics-config
  namespace: default
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: coinet-kafka
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: coinet-ai
data:
  create-topics.sh: |
    #!/bin/bash
    set -e
    
    # Kafka connection details
    KAFKA_BROKER="coinet-kafka:9092"
    
    # Function to create topic
    create_topic() {
        local topic_name=$1
        local partitions=$2
        local replication_factor=$3
        local retention_ms=$4
        local segment_ms=$5
        local compression_type=$6
        local cleanup_policy=$7
        
        echo "Creating topic: $topic_name"
        kafka-topics.sh --create \
            --bootstrap-server $KAFKA_BROKER \
            --topic $topic_name \
            --partitions $partitions \
            --replication-factor $replication_factor \
            --config retention.ms=$retention_ms \
            --config segment.ms=$segment_ms \
            --config compression.type=$compression_type \
            --config cleanup.policy=$cleanup_policy \
            --config min.insync.replicas=2 \
            --if-not-exists
            
        echo "Topic $topic_name created successfully"
    }
    
    # Wait for Kafka to be ready
    echo "Waiting for Kafka cluster to be ready..."
    while ! kafka-topics.sh --bootstrap-server $KAFKA_BROKER --list > /dev/null 2>&1; do
        echo "Kafka not ready, waiting 5 seconds..."
        sleep 5
    done
    echo "Kafka cluster is ready!"
    
    # =============================================================================
    # MARKET DATA TOPICS
    # =============================================================================
    
    # Raw market data streams
    create_topic "market.price.raw" 24 3 86400000 3600000 "snappy" "delete"
    create_topic "market.orderbook.raw" 24 3 3600000 300000 "snappy" "delete"
    create_topic "market.trades.raw" 24 3 86400000 3600000 "snappy" "delete"
    create_topic "market.volume.raw" 12 3 86400000 3600000 "snappy" "delete"
    
    # Processed market data
    create_topic "market.price.processed" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "market.indicators.processed" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "market.signals.processed" 12 3 604800000 3600000 "snappy" "delete"
    
    # Market data aggregations
    create_topic "market.candles.1m" 12 3 2592000000 3600000 "snappy" "delete"
    create_topic "market.candles.5m" 12 3 7776000000 3600000 "snappy" "delete"
    create_topic "market.candles.15m" 12 3 15552000000 3600000 "snappy" "delete"
    create_topic "market.candles.1h" 12 3 31104000000 3600000 "snappy" "delete"
    create_topic "market.candles.4h" 12 3 62208000000 14400000 "snappy" "delete"
    create_topic "market.candles.1d" 6 3 124416000000 86400000 "snappy" "delete"
    
    # =============================================================================
    # NEWS DATA TOPICS
    # =============================================================================
    
    # Raw news feeds
    create_topic "news.articles.raw" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "news.sentiment.raw" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "news.events.raw" 12 3 1209600000 3600000 "snappy" "delete"
    
    # Processed news data
    create_topic "news.articles.processed" 6 3 1209600000 3600000 "snappy" "delete"
    create_topic "news.sentiment.processed" 6 3 1209600000 3600000 "snappy" "delete"
    create_topic "news.impact.processed" 6 3 2592000000 3600000 "snappy" "delete"
    
    # News aggregations
    create_topic "news.sentiment.hourly" 6 3 2592000000 3600000 "snappy" "delete"
    create_topic "news.sentiment.daily" 3 3 7776000000 86400000 "snappy" "delete"
    create_topic "news.trending.topics" 6 3 604800000 3600000 "snappy" "delete"
    
    # =============================================================================
    # SOCIAL MEDIA TOPICS
    # =============================================================================
    
    # Raw social media streams
    create_topic "social.twitter.raw" 24 3 86400000 3600000 "snappy" "delete"
    create_topic "social.reddit.raw" 12 3 86400000 3600000 "snappy" "delete"
    create_topic "social.telegram.raw" 12 3 86400000 3600000 "snappy" "delete"
    create_topic "social.discord.raw" 12 3 86400000 3600000 "snappy" "delete"
    
    # Processed social data
    create_topic "social.sentiment.processed" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "social.mentions.processed" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "social.influence.processed" 12 3 604800000 3600000 "snappy" "delete"
    
    # Social aggregations
    create_topic "social.sentiment.hourly" 6 3 1209600000 3600000 "snappy" "delete"
    create_topic "social.sentiment.daily" 3 3 2592000000 86400000 "snappy" "delete"
    create_topic "social.trending.hashtags" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "social.viral.content" 6 3 604800000 3600000 "snappy" "delete"
    
    # =============================================================================
    # ON-CHAIN DATA TOPICS
    # =============================================================================
    
    # Raw blockchain data
    create_topic "onchain.transactions.raw" 24 3 604800000 3600000 "snappy" "delete"
    create_topic "onchain.blocks.raw" 12 3 2592000000 3600000 "snappy" "delete"
    create_topic "onchain.addresses.raw" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "onchain.whale.movements" 6 3 2592000000 3600000 "snappy" "delete"
    
    # Processed on-chain data
    create_topic "onchain.metrics.processed" 12 3 2592000000 3600000 "snappy" "delete"
    create_topic "onchain.network.health" 6 3 2592000000 3600000 "snappy" "delete"
    create_topic "onchain.defi.tvl" 6 3 604800000 3600000 "snappy" "delete"
    
    # On-chain aggregations
    create_topic "onchain.metrics.hourly" 6 3 7776000000 3600000 "snappy" "delete"
    create_topic "onchain.metrics.daily" 3 3 15552000000 86400000 "snappy" "delete"
    
    # =============================================================================
    # AI & ANALYTICS TOPICS
    # =============================================================================
    
    # AI model outputs
    create_topic "ai.predictions.price" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "ai.predictions.sentiment" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "ai.predictions.volatility" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "ai.anomalies.detected" 6 3 1209600000 3600000 "snappy" "delete"
    
    # Context assembly
    create_topic "ai.context.assembled" 12 3 86400000 3600000 "snappy" "delete"
    create_topic "ai.prompts.generated" 6 3 86400000 3600000 "snappy" "delete"
    create_topic "ai.analysis.complete" 6 3 604800000 3600000 "snappy" "delete"
    
    # Real-time alerts
    create_topic "alerts.price.movement" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "alerts.sentiment.extreme" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "alerts.whale.activity" 6 3 1209600000 3600000 "snappy" "delete"
    create_topic "alerts.news.breaking" 6 3 604800000 3600000 "snappy" "delete"
    
    # =============================================================================
    # SYSTEM & OPERATIONAL TOPICS
    # =============================================================================
    
    # System events
    create_topic "system.events.platform" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "system.events.errors" 6 3 1209600000 3600000 "snappy" "delete"
    create_topic "system.events.audit" 6 3 2592000000 3600000 "snappy" "delete"
    
    # Monitoring and metrics
    create_topic "monitoring.service.health" 6 3 86400000 300000 "snappy" "delete"
    create_topic "monitoring.performance.metrics" 6 3 86400000 300000 "snappy" "delete"
    create_topic "monitoring.resource.usage" 6 3 86400000 300000 "snappy" "delete"
    
    # Data pipeline status
    create_topic "pipeline.ingestion.status" 6 3 86400000 3600000 "snappy" "delete"
    create_topic "pipeline.processing.status" 6 3 86400000 3600000 "snappy" "delete"
    create_topic "pipeline.data.quality" 6 3 604800000 3600000 "snappy" "delete"
    
    # User activity and engagement
    create_topic "user.activity.platform" 12 3 604800000 3600000 "snappy" "delete"
    create_topic "user.engagement.analytics" 6 3 604800000 3600000 "snappy" "delete"
    create_topic "user.preferences.updates" 6 3 1209600000 3600000 "snappy" "delete"
    
    # =============================================================================
    # DEAD LETTER AND ERROR HANDLING
    # =============================================================================
    
    # Dead letter topics for failed messages
    create_topic "dead.letter.market.data" 3 3 2592000000 86400000 "snappy" "delete"
    create_topic "dead.letter.news.data" 3 3 2592000000 86400000 "snappy" "delete"
    create_topic "dead.letter.social.data" 3 3 2592000000 86400000 "snappy" "delete"
    create_topic "dead.letter.onchain.data" 3 3 2592000000 86400000 "snappy" "delete"
    create_topic "dead.letter.ai.processing" 3 3 2592000000 86400000 "snappy" "delete"
    
    # Retry topics
    create_topic "retry.market.data" 3 3 86400000 3600000 "snappy" "delete"
    create_topic "retry.news.data" 3 3 86400000 3600000 "snappy" "delete"
    create_topic "retry.social.data" 3 3 86400000 3600000 "snappy" "delete"
    create_topic "retry.onchain.data" 3 3 86400000 3600000 "snappy" "delete"
    
    echo "All topics created successfully!"
    
    # List all topics
    echo "Listing all topics:"
    kafka-topics.sh --bootstrap-server $KAFKA_BROKER --list
    
    # Show topic details
    echo "Topic details:"
    for topic in $(kafka-topics.sh --bootstrap-server $KAFKA_BROKER --list); do
        echo "=== Topic: $topic ==="
        kafka-topics.sh --bootstrap-server $KAFKA_BROKER --describe --topic $topic
        echo ""
    done

---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-creator
  namespace: default
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: coinet-kafka
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: coinet-ai
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-topic-creator
    spec:
      restartPolicy: OnFailure
      containers:
      - name: topic-creator
        image: confluentinc/cp-kafka:7.5.0
        command: ["/bin/bash"]
        args: ["/scripts/create-topics.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "coinet-kafka-zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://coinet-kafka:9092"
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 200m
      volumes:
      - name: scripts
        configMap:
          name: kafka-topics-config
          defaultMode: 0755

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-topic-schemas
  namespace: default
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: coinet-kafka
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: coinet-ai
data:
  # Market data schema
  market-price-schema.json: |
    {
      "type": "record",
      "name": "MarketPrice",
      "namespace": "com.coinet.market",
      "fields": [
        {"name": "symbol", "type": "string"},
        {"name": "timestamp", "type": "long"},
        {"name": "price", "type": "double"},
        {"name": "volume", "type": "double"},
        {"name": "source", "type": "string"},
        {"name": "exchange", "type": "string"}
      ]
    }
  
  # Order book schema
  market-orderbook-schema.json: |
    {
      "type": "record",
      "name": "OrderBook",
      "namespace": "com.coinet.market",
      "fields": [
        {"name": "symbol", "type": "string"},
        {"name": "timestamp", "type": "long"},
        {"name": "best_bid", "type": "double"},
        {"name": "best_ask", "type": "double"},
        {"name": "bid_quantity", "type": "double"},
        {"name": "ask_quantity", "type": "double"},
        {"name": "spread", "type": "double"},
        {"name": "exchange", "type": "string"}
      ]
    }
  
  # News article schema
  news-article-schema.json: |
    {
      "type": "record",
      "name": "NewsArticle",
      "namespace": "com.coinet.news",
      "fields": [
        {"name": "id", "type": "string"},
        {"name": "title", "type": "string"},
        {"name": "content", "type": "string"},
        {"name": "source", "type": "string"},
        {"name": "published_at", "type": "long"},
        {"name": "sentiment_score", "type": "double"},
        {"name": "sentiment_label", "type": "string"},
        {"name": "confidence", "type": "double"},
        {"name": "symbols", "type": {"type": "array", "items": "string"}},
        {"name": "topics", "type": {"type": "array", "items": "string"}},
        {"name": "importance", "type": "double"}
      ]
    }
  
  # Social media mention schema
  social-mention-schema.json: |
    {
      "type": "record",
      "name": "SocialMention",
      "namespace": "com.coinet.social",
      "fields": [
        {"name": "id", "type": "string"},
        {"name": "platform", "type": "string"},
        {"name": "content", "type": "string"},
        {"name": "author_username", "type": "string"},
        {"name": "author_followers", "type": ["null", "long"], "default": null},
        {"name": "author_influence", "type": ["null", "double"], "default": null},
        {"name": "timestamp", "type": "long"},
        {"name": "sentiment_score", "type": "double"},
        {"name": "sentiment_label", "type": "string"},
        {"name": "confidence", "type": "double"},
        {"name": "engagement_likes", "type": "long"},
        {"name": "engagement_shares", "type": "long"},
        {"name": "engagement_comments", "type": "long"},
        {"name": "symbols", "type": {"type": "array", "items": "string"}}
      ]
    }
  
  # On-chain transaction schema
  onchain-transaction-schema.json: |
    {
      "type": "record",
      "name": "OnChainTransaction",
      "namespace": "com.coinet.onchain",
      "fields": [
        {"name": "hash", "type": "string"},
        {"name": "block_number", "type": "long"},
        {"name": "timestamp", "type": "long"},
        {"name": "from_address", "type": "string"},
        {"name": "to_address", "type": "string"},
        {"name": "value", "type": "double"},
        {"name": "gas_used", "type": "long"},
        {"name": "gas_price", "type": "double"},
        {"name": "network", "type": "string"},
        {"name": "symbol", "type": "string"},
        {"name": "transaction_type", "type": "string"}
      ]
    }
  
  # AI context schema
  ai-context-schema.json: |
    {
      "type": "record",
      "name": "AIContext",
      "namespace": "com.coinet.ai",
      "fields": [
        {"name": "context_id", "type": "string"},
        {"name": "symbol", "type": "string"},
        {"name": "timestamp", "type": "long"},
        {"name": "timeframe", "type": "string"},
        {"name": "market_data", "type": "string"},
        {"name": "news_data", "type": "string"},
        {"name": "social_data", "type": "string"},
        {"name": "onchain_data", "type": ["null", "string"], "default": null},
        {"name": "aggregated_sentiment", "type": "double"},
        {"name": "sentiment_confidence", "type": "double"},
        {"name": "market_momentum", "type": "string"},
        {"name": "volatility", "type": "string"},
        {"name": "importance_score", "type": "double"},
        {"name": "completeness_score", "type": "double"}
      ]
    }
  
  # Alert schema
  alert-schema.json: |
    {
      "type": "record",
      "name": "Alert",
      "namespace": "com.coinet.alerts",
      "fields": [
        {"name": "alert_id", "type": "string"},
        {"name": "alert_type", "type": "string"},
        {"name": "symbol", "type": "string"},
        {"name": "timestamp", "type": "long"},
        {"name": "severity", "type": "string"},
        {"name": "title", "type": "string"},
        {"name": "message", "type": "string"},
        {"name": "data", "type": "string"},
        {"name": "source", "type": "string"},
        {"name": "actions_required", "type": {"type": "array", "items": "string"}}
      ]
    } 