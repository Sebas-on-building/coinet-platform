# Simple Kafka deployment for testing
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: default
data:
  server.properties: |
    broker.id=1
    listeners=PLAINTEXT://0.0.0.0:9092
    advertised.listeners=PLAINTEXT://coinet-kafka:9092
    zookeeper.connect=coinet-zookeeper:2181
    log.dirs=/kafka/kafka-logs
    num.partitions=3
    default.replication.factor=1
    min.insync.replicas=1
    log.retention.hours=168
    compression.type=snappy

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coinet-zookeeper
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coinet-zookeeper
  template:
    metadata:
      labels:
        app: coinet-zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 200m

---
apiVersion: v1
kind: Service
metadata:
  name: coinet-zookeeper
  namespace: default
spec:
  selector:
    app: coinet-zookeeper
  ports:
  - port: 2181
    targetPort: 2181
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coinet-kafka
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coinet-kafka
  template:
    metadata:
      labels:
        app: coinet-kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.4.0
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "coinet-zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://coinet-kafka:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_NUM_PARTITIONS
          value: "3"
        - name: KAFKA_DEFAULT_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_MIN_INSYNC_REPLICAS
          value: "1"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "168"
        - name: KAFKA_COMPRESSION_TYPE
          value: "snappy"
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: coinet-kafka
  namespace: default
spec:
  selector:
    app: coinet-kafka
  ports:
  - port: 9092
    targetPort: 9092
  type: ClusterIP 