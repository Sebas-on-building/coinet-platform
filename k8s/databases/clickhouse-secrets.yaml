apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-scripts
  namespace: default
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: coinet-clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: coinet-ai
data:
  # Users configuration
  users.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <profiles>
            <default>
                <max_memory_usage>10000000000</max_memory_usage>
                <use_uncompressed_cache>1</use_uncompressed_cache>
                <load_balancing>random</load_balancing>
                <max_execution_time>3600</max_execution_time>
                <max_concurrent_queries_for_user>100</max_concurrent_queries_for_user>
            </default>
            
            <readonly>
                <readonly>1</readonly>
                <max_memory_usage>5000000000</max_memory_usage>
                <max_execution_time>1800</max_execution_time>
                <max_concurrent_queries_for_user>50</max_concurrent_queries_for_user>
            </readonly>
        </profiles>
        
        <users>
            <default>
                <password_sha256_hex>c2a4e5e44e26265a8e22b5be03b1ac82f3b29cd3ff93c6a84e6c0a65e5d8e98a</password_sha256_hex>
                <networks incl="networks_config"/>
                <profile>default</profile>
                <quota>default</quota>
            </default>
            
            <coinet_analyst>
                <password_sha256_hex>f9c8b8e7e15b2e8d8a1c5d8f9e2a7b4c6d8e9f1a2b3c4d5e6f7a8b9c0d1e2f3a</password_sha256_hex>
                <networks incl="networks_config"/>
                <profile>readonly</profile>
                <quota>default</quota>
                <allow_databases>
                    <database>coinet_analytics</database>
                    <database>market_analytics</database>
                    <database>social_analytics</database>
                    <database>news_analytics</database>
                    <database>onchain_analytics</database>
                </allow_databases>
            </coinet_analyst>
            
            <coinet_etl>
                <password_sha256_hex>a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2</password_sha256_hex>
                <networks incl="networks_config"/>
                <profile>default</profile>
                <quota>default</quota>
                <allow_databases>
                    <database>coinet_analytics</database>
                    <database>market_analytics</database>
                    <database>social_analytics</database>
                    <database>news_analytics</database>
                    <database>onchain_analytics</database>
                </allow_databases>
            </coinet_etl>
            
            <coinet_kafka>
                <password_sha256_hex>b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3</password_sha256_hex>
                <networks incl="networks_config"/>
                <profile>default</profile>
                <quota>default</quota>
                <allow_databases>
                    <database>coinet_analytics</database>
                    <database>market_analytics</database>
                    <database>social_analytics</database>
                    <database>news_analytics</database>
                    <database>onchain_analytics</database>
                </allow_databases>
            </coinet_kafka>
        </users>
        
        <quotas>
            <default>
                <interval>
                    <duration>3600</duration>
                    <queries>1000</queries>
                    <errors>100</errors>
                    <result_rows>1000000000</result_rows>
                    <read_rows>1000000000</read_rows>
                    <execution_time>3600</execution_time>
                </interval>
            </default>
        </quotas>
    </clickhouse>
  
  # Network configuration
  networks.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <networks_config>
            <ip>::/0</ip>
        </networks_config>
    </clickhouse>
  
  # Remote servers configuration for clustering
  remote_servers.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <remote_servers>
            <coinet_cluster>
                <shard>
                    <replica>
                        <host>coinet-clickhouse-0.coinet-clickhouse</host>
                        <port>9000</port>
                    </replica>
                    <replica>
                        <host>coinet-clickhouse-1.coinet-clickhouse</host>
                        <port>9000</port>
                    </replica>
                    <replica>
                        <host>coinet-clickhouse-2.coinet-clickhouse</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </coinet_cluster>
        </remote_servers>
    </clickhouse>
  
  # ZooKeeper configuration for replication
  zookeeper.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <zookeeper>
            <node>
                <host>coinet-clickhouse-zookeeper-0.coinet-clickhouse-zookeeper</host>
                <port>2181</port>
            </node>
            <node>
                <host>coinet-clickhouse-zookeeper-1.coinet-clickhouse-zookeeper</host>
                <port>2181</port>
            </node>
            <node>
                <host>coinet-clickhouse-zookeeper-2.coinet-clickhouse-zookeeper</host>
                <port>2181</port>
            </node>
        </zookeeper>
        
        <distributed_ddl>
            <path>/clickhouse/task_queue/ddl</path>
        </distributed_ddl>
    </clickhouse> 