---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: default
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: coinet-clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: coinet-ai
data:
  # Database configuration
  CLICKHOUSE_DB: "coinet_analytics"
  CLICKHOUSE_USER: "default"
  
  # Connection settings
  CLICKHOUSE_HOST: "coinet-clickhouse"
  CLICKHOUSE_HTTP_PORT: "8123"
  CLICKHOUSE_TCP_PORT: "9000"
  
  # Performance settings
  CLICKHOUSE_MAX_MEMORY_USAGE: "10000000000"
  CLICKHOUSE_MAX_CONCURRENT_QUERIES: "100"
  CLICKHOUSE_MAX_EXECUTION_TIME: "3600"
  
  # Kafka integration settings
  KAFKA_BROKER_LIST: "coinet-kafka:9092"
  KAFKA_GROUP_NAME: "clickhouse-consumer-group"
  
  # Backup settings
  BACKUP_ENABLED: "true"
  BACKUP_RETENTION_DAYS: "7"
  BACKUP_SCHEDULE: "0 2 * * *"

