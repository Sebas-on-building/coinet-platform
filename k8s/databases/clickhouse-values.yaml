# =============================================================================
# COINET AI CLICKHOUSE HELM VALUES
# Production-ready ClickHouse deployment for analytical workloads
# =============================================================================

# Global ClickHouse configuration
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "fast-ssd"

# ClickHouse cluster configuration
clickhouse:
  # Replica configuration
  replicaCount: 3
  
  # Image configuration
  image:
    registry: docker.io
    repository: clickhouse/clickhouse-server
    tag: 23.12.2.59-alpine
    pullPolicy: IfNotPresent
    
  # ClickHouse configuration
  config:
    # Server configuration
    listen_host: "::"
    http_port: 8123
    tcp_port: 9000
    mysql_port: 9004
    postgresql_port: 9005
    interserver_http_port: 9009
    
    # Performance settings
    max_connections: 4096
    keep_alive_timeout: 3
    max_concurrent_queries: 100
    uncompressed_cache_size: 8589934592
    mark_cache_size: 5368709120
    
    # Memory settings
    max_memory_usage: 10000000000
    max_memory_usage_for_user: 10000000000
    max_memory_usage_for_all_queries: 10000000000
    
    # Merge tree settings (for analytics optimization)
    merge_tree:
      parts_to_delay_insert: 150
      parts_to_throw_insert: 300
      max_replicated_merges_in_queue: 16
      number_of_free_entries_in_pool_to_lower_max_size_of_merge: 8
      max_bytes_to_merge_at_min_space_in_pool: 1048576
      
    # Query execution settings
    max_execution_time: 3600
    max_query_size: 268435456
    max_parser_depth: 1000
    
    # Compression settings
    compression:
      - method: zstd
        level: 1
        
    # Logging
    log_level: information
    errorlog: /var/log/clickhouse-server/clickhouse-server.err.log
    log: /var/log/clickhouse-server/clickhouse-server.log
    
    # Distributed settings
    distributed_ddl:
      path: /clickhouse/task_queue/ddl
      
    # Storage configuration
    path: /var/lib/clickhouse/
    tmp_path: /var/lib/clickhouse/tmp/
    
    # User directories
    users_config: users.xml
    
    # Kafka integration
    kafka:
      enable_ssl: false
      security_protocol: plaintext
      sasl_mechanism: plain
      
  # User configuration
  users:
    # Default admin user
    default:
      password: "clickhouse-admin-2024!"
      networks:
        - "::/0"
      profile: default
      quota: default
      
    # Application users
    coinet_analyst:
      password: "analyst-readonly-2024!"
      networks:
        - "::/0"
      profile: readonly
      quota: default
      databases:
        - coinet_analytics
        
    coinet_etl:
      password: "etl-readwrite-2024!"
      networks:
        - "::/0"
      profile: default
      quota: default
      databases:
        - coinet_analytics
        
    coinet_kafka:
      password: "kafka-integration-2024!"
      networks:
        - "::/0"
      profile: default
      quota: default
      databases:
        - coinet_analytics

  # Resource configuration
  resources:
    requests:
      memory: 8Gi
      cpu: 2000m
    limits:
      memory: 16Gi
      cpu: 4000m

  # Persistence configuration
  persistence:
    enabled: true
    size: 500Gi
    storageClass: "fast-ssd"
    accessModes:
      - ReadWriteOnce
    mountPath: /var/lib/clickhouse
    
  # Additional persistence for logs
  logsPersistence:
    enabled: true
    size: 50Gi
    storageClass: "fast-ssd"
    accessModes:
      - ReadWriteOnce
    mountPath: /var/log/clickhouse-server

  # Service configuration
  service:
    type: ClusterIP
    ports:
      http: 8123
      tcp: 9000
      mysql: 9004
      postgresql: 9005
      interserver: 9009
    annotations:
      service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"

  # Security context
  podSecurityContext:
    enabled: true
    fsGroup: 101
    runAsUser: 101
    
  containerSecurityContext:
    enabled: true
    runAsUser: 101
    runAsNonRoot: true
    readOnlyRootFilesystem: false

  # Liveness and readiness probes
  livenessProbe:
    enabled: true
    httpGet:
      path: /ping
      port: 8123
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    
  readinessProbe:
    enabled: true
    httpGet:
      path: /ping
      port: 8123
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  # Startup probe
  startupProbe:
    enabled: true
    httpGet:
      path: /ping
      port: 8123
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1

  # Pod management
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    
  # Pod disruption budget
  pdb:
    create: true
    minAvailable: 2
    maxUnavailable: ""

  # Node selection and affinity
  nodeSelector:
    kubernetes.io/arch: amd64
    
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - clickhouse
          topologyKey: kubernetes.io/hostname
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values: ["memory-optimized", "compute-optimized"]

  # Tolerations
  tolerations:
    - key: "clickhouse"
      operator: "Equal"
      value: "dedicated"
      effect: "NoSchedule"

  # Pod labels and annotations
  podLabels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: coinet-clickhouse
    app.kubernetes.io/component: analytics
    app.kubernetes.io/part-of: coinet-ai
    
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9363"
    prometheus.io/path: "/metrics"

# ZooKeeper configuration (for ClickHouse replication)
zookeeper:
  enabled: true
  replicaCount: 3
  
  # Resource configuration
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
      
  # Persistence configuration
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "fast-ssd"
    
  # Service configuration
  service:
    type: ClusterIP
    ports:
      client: 2181
      follower: 2888
      election: 3888

  # Pod disruption budget
  pdb:
    create: true
    minAvailable: 2

# ClickHouse Operator configuration
operator:
  enabled: true
  
  image:
    registry: docker.io
    repository: altinity/clickhouse-operator
    tag: 0.21.2
    pullPolicy: IfNotPresent
    
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m

# Monitoring configuration
monitoring:
  enabled: true
  
  # ClickHouse exporter
  exporter:
    enabled: true
    image:
      registry: docker.io
      repository: f1yegor/clickhouse-exporter
      tag: 0.20.2
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m
    service:
      type: ClusterIP
      port: 9363
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9363"
        prometheus.io/path: "/metrics"
  
  # ServiceMonitor for Prometheus
  serviceMonitor:
    enabled: true
    namespace: "coinet-monitoring"
    interval: 30s
    scrapeTimeout: 10s
    
  # PrometheusRule for alerting
  prometheusRule:
    enabled: true
    namespace: "coinet-monitoring"

# Network policies
networkPolicy:
  enabled: true
  allowExternal: false
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: coinet-dev
        - namespaceSelector:
            matchLabels:
              name: coinet-staging
        - namespaceSelector:
            matchLabels:
              name: coinet-production
      ports:
        - port: 8123
          protocol: TCP
        - port: 9000
          protocol: TCP

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 7           # Keep 7 days of backups
  storageClass: "standard"
  size: 100Gi
  
  # Backup script configuration
  script: |
    #!/bin/bash
    DATE=$(date +%Y%m%d_%H%M%S)
    BACKUP_PATH="/backup/clickhouse_backup_$DATE"
    
    # Create backup directory
    mkdir -p $BACKUP_PATH
    
    # Backup metadata
    clickhouse-client --query "SHOW DATABASES" > $BACKUP_PATH/databases.sql
    
    # Backup each database
    for db in $(clickhouse-client --query "SHOW DATABASES" | grep -v system); do
      clickhouse-client --query "SHOW CREATE DATABASE $db" > $BACKUP_PATH/$db.sql
      clickhouse-client --query "SHOW TABLES FROM $db" | while read table; do
        clickhouse-client --query "SHOW CREATE TABLE $db.$table" >> $BACKUP_PATH/$db.sql
        clickhouse-client --query "SELECT * FROM $db.$table FORMAT Native" > $BACKUP_PATH/${db}_${table}.native
      done
    done
    
    # Compress backup
    tar -czf $BACKUP_PATH.tar.gz -C /backup clickhouse_backup_$DATE
    rm -rf $BACKUP_PATH
    
    # Cleanup old backups
    find /backup -name "clickhouse_backup_*.tar.gz" -mtime +7 -delete

# Analytical database initialization
initDatabase:
  enabled: true
  databases:
    - coinet_analytics
  
  # Database initialization scripts
  scripts:
    01-create-databases.sql: |
      -- Create main analytics database
      CREATE DATABASE IF NOT EXISTS coinet_analytics;
      
      -- Create databases for different data types
      CREATE DATABASE IF NOT EXISTS market_analytics;
      CREATE DATABASE IF NOT EXISTS social_analytics;
      CREATE DATABASE IF NOT EXISTS news_analytics;
      CREATE DATABASE IF NOT EXISTS onchain_analytics;
      
    02-create-tables.sql: |
      -- Market data analytics tables
      CREATE TABLE IF NOT EXISTS market_analytics.price_history
      (
          timestamp DateTime64(3),
          symbol LowCardinality(String),
          exchange LowCardinality(String),
          price Float64,
          volume Float64,
          market_cap Float64,
          date Date MATERIALIZED toDate(timestamp)
      )
      ENGINE = MergeTree()
      PARTITION BY toYYYYMM(timestamp)
      ORDER BY (symbol, timestamp)
      TTL timestamp + INTERVAL 2 YEAR;
      
      -- OHLCV candles table
      CREATE TABLE IF NOT EXISTS market_analytics.ohlcv_candles
      (
          timestamp DateTime64(3),
          symbol LowCardinality(String),
          timeframe LowCardinality(String),
          open Float64,
          high Float64,
          low Float64,
          close Float64,
          volume Float64,
          trades UInt64,
          date Date MATERIALIZED toDate(timestamp)
      )
      ENGINE = MergeTree()
      PARTITION BY (toYYYYMM(timestamp), timeframe)
      ORDER BY (symbol, timeframe, timestamp)
      TTL timestamp + INTERVAL 3 YEAR;
      
      -- Social sentiment analytics
      CREATE TABLE IF NOT EXISTS social_analytics.sentiment_scores
      (
          timestamp DateTime64(3),
          symbol LowCardinality(String),
          platform LowCardinality(String),
          sentiment_score Float32,
          confidence Float32,
          volume UInt32,
          influence_score Float32,
          date Date MATERIALIZED toDate(timestamp)
      )
      ENGINE = MergeTree()
      PARTITION BY toYYYYMM(timestamp)
      ORDER BY (symbol, platform, timestamp)
      TTL timestamp + INTERVAL 1 YEAR;
      
      -- News impact analytics
      CREATE TABLE IF NOT EXISTS news_analytics.news_impact
      (
          timestamp DateTime64(3),
          symbol LowCardinality(String),
          source LowCardinality(String),
          title String,
          sentiment_score Float32,
          importance Float32,
          price_impact Float32,
          volume_spike Float32,
          date Date MATERIALIZED toDate(timestamp)
      )
      ENGINE = MergeTree()
      PARTITION BY toYYYYMM(timestamp)
      ORDER BY (symbol, timestamp)
      TTL timestamp + INTERVAL 2 YEAR;
      
      -- On-chain analytics
      CREATE TABLE IF NOT EXISTS onchain_analytics.network_metrics
      (
          timestamp DateTime64(3),
          symbol LowCardinality(String),
          network LowCardinality(String),
          active_addresses UInt64,
          transaction_count UInt64,
          transaction_volume Float64,
          hash_rate Float64,
          difficulty Float64,
          date Date MATERIALIZED toDate(timestamp)
      )
      ENGINE = MergeTree()
      PARTITION BY toYYYYMM(timestamp)
      ORDER BY (symbol, network, timestamp)
      TTL timestamp + INTERVAL 3 YEAR;
      
    03-create-materialized-views.sql: |
      -- Hourly price aggregations
      CREATE MATERIALIZED VIEW IF NOT EXISTS market_analytics.price_hourly_mv
      TO market_analytics.price_hourly
      AS SELECT
          toStartOfHour(timestamp) as hour,
          symbol,
          exchange,
          argMax(price, timestamp) as close_price,
          max(price) as high_price,
          min(price) as low_price,
          argMin(price, timestamp) as open_price,
          sum(volume) as total_volume,
          count() as tick_count
      FROM market_analytics.price_history
      GROUP BY hour, symbol, exchange;
      
      CREATE TABLE IF NOT EXISTS market_analytics.price_hourly
      (
          hour DateTime,
          symbol LowCardinality(String),
          exchange LowCardinality(String),
          open_price Float64,
          high_price Float64,
          low_price Float64,
          close_price Float64,
          total_volume Float64,
          tick_count UInt64
      )
      ENGINE = SummingMergeTree()
      ORDER BY (symbol, exchange, hour);
      
      -- Daily sentiment aggregations
      CREATE MATERIALIZED VIEW IF NOT EXISTS social_analytics.sentiment_daily_mv
      TO social_analytics.sentiment_daily
      AS SELECT
          toDate(timestamp) as date,
          symbol,
          platform,
          avg(sentiment_score) as avg_sentiment,
          avgIf(sentiment_score, confidence > 0.7) as high_confidence_sentiment,
          sum(volume) as total_volume,
          avg(influence_score) as avg_influence
      FROM social_analytics.sentiment_scores
      GROUP BY date, symbol, platform;
      
      CREATE TABLE IF NOT EXISTS social_analytics.sentiment_daily
      (
          date Date,
          symbol LowCardinality(String),
          platform LowCardinality(String),
          avg_sentiment Float32,
          high_confidence_sentiment Float32,
          total_volume UInt64,
          avg_influence Float32
      )
      ENGINE = SummingMergeTree()
      ORDER BY (symbol, platform, date);
      
    04-create-functions.sql: |
      -- Price change calculation function
      CREATE OR REPLACE FUNCTION calculatePriceChange(current_price Float64, previous_price Float64)
      RETURNS Float64
      LANGUAGE SQL
      AS 'SELECT (current_price - previous_price) / previous_price * 100';
      
      -- Bollinger Bands calculation
      CREATE OR REPLACE FUNCTION calculateBollingerBands(prices Array(Float64), period UInt32)
      RETURNS Tuple(Float64, Float64, Float64)
      LANGUAGE SQL
      AS '
      WITH 
          sma AS (SELECT arrayAvg(arraySlice(prices, -period)) as moving_avg),
          std_dev AS (SELECT sqrt(arrayAvg(arrayMap(x -> pow(x - sma.moving_avg, 2), arraySlice(prices, -period)))) FROM sma)
      SELECT (sma.moving_avg, sma.moving_avg + 2 * std_dev.sqrt, sma.moving_avg - 2 * std_dev.sqrt)
      FROM sma, std_dev
      ';
      
      -- RSI calculation function
      CREATE OR REPLACE FUNCTION calculateRSI(prices Array(Float64), period UInt32)
      RETURNS Float64
      LANGUAGE SQL
      AS '
      WITH
          price_changes AS (
              SELECT arrayMap(i -> prices[i] - prices[i-1], range(2, length(prices) + 1)) as changes
          ),
          gains AS (
              SELECT arrayMap(x -> if(x > 0, x, 0), price_changes.changes) as gain_array FROM price_changes
          ),
          losses AS (
              SELECT arrayMap(x -> if(x < 0, -x, 0), price_changes.changes) as loss_array FROM price_changes
          ),
          avg_gain AS (
              SELECT arrayAvg(arraySlice(gains.gain_array, -period)) as avg_g FROM gains
          ),
          avg_loss AS (
              SELECT arrayAvg(arraySlice(losses.loss_array, -period)) as avg_l FROM losses
          )
      SELECT if(avg_loss.avg_l = 0, 100, 100 - (100 / (1 + avg_gain.avg_g / avg_loss.avg_l)))
      FROM avg_gain, avg_loss
      ';

# Kafka integration
kafka:
  enabled: true
  topics:
    - market.price.processed
    - news.articles.processed
    - social.sentiment.processed
    - onchain.metrics.processed
  
  # Kafka engine configuration
  engine_config: |
    CREATE TABLE IF NOT EXISTS market_analytics.kafka_price_queue
    (
        timestamp DateTime64(3),
        symbol String,
        exchange String,
        price Float64,
        volume Float64
    )
    ENGINE = Kafka()
    SETTINGS
        kafka_broker_list = 'coinet-kafka:9092',
        kafka_topic_list = 'market.price.processed',
        kafka_group_name = 'clickhouse-market-consumer',
        kafka_format = 'JSONEachRow',
        kafka_skip_broken_messages = 1000;

# Performance optimization
optimization:
  # Memory usage settings
  max_memory_usage: 10000000000
  max_memory_usage_for_user: 10000000000
  
  # Query execution settings
  max_execution_time: 3600
  max_concurrent_queries: 100
  
  # Merge settings
  background_pool_size: 16
  background_merges_mutations_concurrency_ratio: 4
  
  # Cache settings
  uncompressed_cache_size: 8589934592
  mark_cache_size: 5368709120 