# =============================================================================
# COINET AI TIMESCALEDB HELM VALUES
# Production-ready TimescaleDB deployment configuration
# =============================================================================

# Global TimescaleDB configuration
image:
  repository: timescale/timescaledb-ha
  tag: pg15-latest
  pullPolicy: IfNotPresent

# Database configuration
postgresql:
  # Database authentication
  auth:
    postgresPassword: "coinet-timescale-2024!"  # Should be stored in Secret
    username: "coinet"
    password: "coinet-app-2024!"               # Should be stored in Secret
    database: "coinet_timeseries"
    
  # PostgreSQL configuration parameters
  pgConfig:
    # TimescaleDB specific settings
    shared_preload_libraries: "timescaledb"
    timescaledb.telemetry_level: "off"
    
    # Performance tuning
    max_connections: 200
    shared_buffers: 256MB
    effective_cache_size: 1GB
    maintenance_work_mem: 64MB
    checkpoint_completion_target: 0.9
    wal_buffers: 16MB
    default_statistics_target: 100
    random_page_cost: 1.1
    effective_io_concurrency: 200
    
    # Time-series optimization
    max_background_workers: 16
    max_worker_processes: 16
    timescaledb.max_background_workers: 8
    
    # WAL and replication
    wal_level: replica
    max_wal_senders: 10
    max_replication_slots: 10
    
    # Logging
    log_destination: "stderr"
    log_statement: "mod"
    log_min_duration_statement: 1000
    log_line_prefix: "%t [%p-%l] %q%u@%d "

# Persistence configuration
persistence:
  enabled: true
  storageClass: "fast-ssd"  # Use high-performance storage
  size: 100Gi
  accessModes:
    - ReadWriteOnce
  annotations:
    volume.beta.kubernetes.io/storage-class: "fast-ssd"

# Resource allocation
resources:
  requests:
    memory: 1Gi
    cpu: 500m
  limits:
    memory: 2Gi
    cpu: 1000m

# Service configuration
service:
  type: ClusterIP
  port: 5432
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

# High Availability configuration
replication:
  enabled: true
  readReplicas: 2
  synchronous: false

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 7           # Keep 7 days of backups
  storageClass: "standard"
  size: 50Gi

# Monitoring configuration
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: "coinet-monitoring"
    interval: "30s"
  prometheusRule:
    enabled: true
    namespace: "coinet-monitoring"

# Security configuration
securityContext:
  enabled: true
  fsGroup: 1001
  runAsUser: 1001
  runAsNonRoot: true

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  runAsNonRoot: true

# Network policies
networkPolicy:
  enabled: true
  allowExternal: false
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: coinet-dev
        - namespaceSelector:
            matchLabels:
              name: coinet-staging
        - namespaceSelector:
            matchLabels:
              name: coinet-production
      ports:
        - port: 5432
          protocol: TCP

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Liveness and readiness probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

# Init containers for database setup
initContainers:
  - name: init-timescaledb
    image: timescale/timescaledb:2.11.2-pg15
    command:
      - /bin/bash
      - -c
      - |
        echo "Initializing TimescaleDB extensions and schemas..."
        # Extensions and initial setup will be handled in init scripts

# Pod labels and annotations
podLabels:
  app.kubernetes.io/name: timescaledb
  app.kubernetes.io/instance: coinet-timescaledb
  app.kubernetes.io/component: database
  app.kubernetes.io/part-of: coinet-ai

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9187"
  prometheus.io/path: "/metrics"

# Node selection and affinity
nodeSelector:
  kubernetes.io/arch: amd64
  node.kubernetes.io/instance-type: "memory-optimized"

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: "node.kubernetes.io/instance-type"
              operator: In
              values: ["memory-optimized", "general-purpose"]
  
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: ["timescaledb"]
          topologyKey: kubernetes.io/hostname

# Tolerations for dedicated nodes
tolerations:
  - key: "database"
    operator: "Equal"
    value: "timescaledb"
    effect: "NoSchedule"

# Custom configuration for TimescaleDB
customConfig:
  postgresql.conf: |
    # TimescaleDB specific configuration
    timescaledb.telemetry_level = off
    timescaledb.last_tuned = '2024-01-01T00:00:00Z'
    timescaledb.last_tuned_version = '0.12.0'
    
    # Compression settings
    timescaledb.enable_transparent_decompression = on
    timescaledb.enable_chunk_skipping = on
    timescaledb.enable_constraint_awareness = on
    
    # Performance settings for time-series workloads
    synchronous_commit = off
    checkpoint_segments = 32
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    
    # Connection settings
    max_connections = 200
    superuser_reserved_connections = 3
    
    # Memory settings
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    
    # Parallel query settings
    max_worker_processes = 16
    max_parallel_workers_per_gather = 4
    max_parallel_workers = 8
    max_parallel_maintenance_workers = 4

# Environment variables
env:
  - name: POSTGRES_DB
    value: "coinet_timeseries"
  - name: POSTGRES_USER
    value: "coinet"
  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: timescaledb-credentials
        key: postgres-password
  - name: TIMESCALEDB_TELEMETRY
    value: "off"
  - name: TS_TUNE_MEMORY
    value: "1GB"
  - name: TS_TUNE_NUM_CPUS
    value: "2"

# Additional services for read replicas
readReplicaService:
  enabled: true
  type: ClusterIP
  port: 5432
  name: "timescaledb-read"

# Custom init scripts
initScripts:
  01-create-extensions.sql: |
    -- Create TimescaleDB extension
    CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
    
    -- Create additional useful extensions
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    CREATE EXTENSION IF NOT EXISTS uuid-ossp;
    
    -- Create schemas for different data types
    CREATE SCHEMA IF NOT EXISTS market_data;
    CREATE SCHEMA IF NOT EXISTS social_data;
    CREATE SCHEMA IF NOT EXISTS news_data;
    CREATE SCHEMA IF NOT EXISTS onchain_data;
    CREATE SCHEMA IF NOT EXISTS analytics;
    
  02-create-tables.sql: |
    -- Market data tables
    CREATE TABLE IF NOT EXISTS market_data.price_candles (
      time TIMESTAMPTZ NOT NULL,
      symbol VARCHAR(20) NOT NULL,
      timeframe VARCHAR(10) NOT NULL,
      open_price DECIMAL(20,8) NOT NULL,
      high_price DECIMAL(20,8) NOT NULL,
      low_price DECIMAL(20,8) NOT NULL,
      close_price DECIMAL(20,8) NOT NULL,
      volume DECIMAL(30,8) NOT NULL,
      quote_volume DECIMAL(30,8),
      trades_count INTEGER,
      PRIMARY KEY (time, symbol, timeframe)
    );
    
    -- Convert to hypertable
    SELECT create_hypertable('market_data.price_candles', 'time', if_not_exists => TRUE);
    
    -- Create compression policy (compress data older than 7 days)
    SELECT add_compression_policy('market_data.price_candles', INTERVAL '7 days', if_not_exists => TRUE);
    
    -- Create retention policy (keep data for 2 years)
    SELECT add_retention_policy('market_data.price_candles', INTERVAL '2 years', if_not_exists => TRUE);
    
    -- Order book snapshots
    CREATE TABLE IF NOT EXISTS market_data.order_book_snapshots (
      time TIMESTAMPTZ NOT NULL,
      symbol VARCHAR(20) NOT NULL,
      best_bid DECIMAL(20,8) NOT NULL,
      best_ask DECIMAL(20,8) NOT NULL,
      bid_quantity DECIMAL(30,8) NOT NULL,
      ask_quantity DECIMAL(30,8) NOT NULL,
      spread DECIMAL(20,8) NOT NULL,
      PRIMARY KEY (time, symbol)
    );
    
    SELECT create_hypertable('market_data.order_book_snapshots', 'time', if_not_exists => TRUE);
    SELECT add_compression_policy('market_data.order_book_snapshots', INTERVAL '1 day', if_not_exists => TRUE);
    SELECT add_retention_policy('market_data.order_book_snapshots', INTERVAL '30 days', if_not_exists => TRUE);
    
    -- Social sentiment data
    CREATE TABLE IF NOT EXISTS social_data.sentiment_scores (
      time TIMESTAMPTZ NOT NULL,
      symbol VARCHAR(20) NOT NULL,
      platform VARCHAR(20) NOT NULL,
      sentiment_score DECIMAL(5,4) NOT NULL CHECK (sentiment_score >= -1 AND sentiment_score <= 1),
      confidence DECIMAL(5,4) NOT NULL CHECK (confidence >= 0 AND confidence <= 1),
      volume INTEGER NOT NULL DEFAULT 0,
      PRIMARY KEY (time, symbol, platform)
    );
    
    SELECT create_hypertable('social_data.sentiment_scores', 'time', if_not_exists => TRUE);
    SELECT add_compression_policy('social_data.sentiment_scores', INTERVAL '7 days', if_not_exists => TRUE);
    SELECT add_retention_policy('social_data.sentiment_scores', INTERVAL '1 year', if_not_exists => TRUE);
    
    -- News impact tracking
    CREATE TABLE IF NOT EXISTS news_data.news_impact (
      time TIMESTAMPTZ NOT NULL,
      symbol VARCHAR(20) NOT NULL,
      source VARCHAR(50) NOT NULL,
      sentiment_score DECIMAL(5,4) NOT NULL,
      importance DECIMAL(5,4) NOT NULL,
      price_impact DECIMAL(10,6),
      volume_spike DECIMAL(10,2),
      PRIMARY KEY (time, symbol, source)
    );
    
    SELECT create_hypertable('news_data.news_impact', 'time', if_not_exists => TRUE);
    SELECT add_compression_policy('news_data.news_impact', INTERVAL '30 days', if_not_exists => TRUE);
    SELECT add_retention_policy('news_data.news_impact', INTERVAL '2 years', if_not_exists => TRUE);
    
    -- On-chain metrics
    CREATE TABLE IF NOT EXISTS onchain_data.network_metrics (
      time TIMESTAMPTZ NOT NULL,
      symbol VARCHAR(20) NOT NULL,
      network VARCHAR(20) NOT NULL,
      active_addresses BIGINT,
      transaction_count BIGINT,
      transaction_volume DECIMAL(30,8),
      average_transaction_value DECIMAL(20,8),
      hash_rate DECIMAL(30,2),
      difficulty DECIMAL(30,2),
      block_time DECIMAL(10,2),
      PRIMARY KEY (time, symbol, network)
    );
    
    SELECT create_hypertable('onchain_data.network_metrics', 'time', if_not_exists => TRUE);
    SELECT add_compression_policy('onchain_data.network_metrics', INTERVAL '30 days', if_not_exists => TRUE);
    SELECT add_retention_policy('onchain_data.network_metrics', INTERVAL '3 years', if_not_exists => TRUE);
    
  03-create-indexes.sql: |
    -- Performance indexes for common queries
    
    -- Market data indexes
    CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_price_candles_symbol_time 
      ON market_data.price_candles (symbol, time DESC);
    
    CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_price_candles_timeframe 
      ON market_data.price_candles (timeframe, time DESC);
    
    -- Social data indexes
    CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_sentiment_symbol_platform 
      ON social_data.sentiment_scores (symbol, platform, time DESC);
    
    -- News data indexes
    CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_news_impact_importance 
      ON news_data.news_impact (importance DESC, time DESC);
    
    -- On-chain data indexes
    CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_network_metrics_network 
      ON onchain_data.network_metrics (network, time DESC);
    
  04-create-functions.sql: |
    -- Utility functions for common time-series operations
    
    -- Function to get latest price for a symbol
    CREATE OR REPLACE FUNCTION market_data.get_latest_price(symbol_param VARCHAR(20))
    RETURNS DECIMAL(20,8) AS $$
    BEGIN
      RETURN (
        SELECT close_price 
        FROM market_data.price_candles 
        WHERE symbol = symbol_param 
        ORDER BY time DESC 
        LIMIT 1
      );
    END;
    $$ LANGUAGE plpgsql;
    
    -- Function to calculate price change percentage
    CREATE OR REPLACE FUNCTION market_data.calculate_price_change(
      symbol_param VARCHAR(20), 
      interval_param INTERVAL
    )
    RETURNS DECIMAL(10,4) AS $$
    DECLARE
      current_price DECIMAL(20,8);
      previous_price DECIMAL(20,8);
    BEGIN
      -- Get current price
      SELECT close_price INTO current_price
      FROM market_data.price_candles 
      WHERE symbol = symbol_param 
      ORDER BY time DESC 
      LIMIT 1;
      
      -- Get price from specified interval ago
      SELECT close_price INTO previous_price
      FROM market_data.price_candles 
      WHERE symbol = symbol_param 
        AND time <= NOW() - interval_param
      ORDER BY time DESC 
      LIMIT 1;
      
      -- Calculate percentage change
      IF previous_price IS NULL OR previous_price = 0 THEN
        RETURN NULL;
      END IF;
      
      RETURN ((current_price - previous_price) / previous_price) * 100;
    END;
    $$ LANGUAGE plpgsql;
    
    -- Function to get average sentiment for a symbol
    CREATE OR REPLACE FUNCTION social_data.get_average_sentiment(
      symbol_param VARCHAR(20),
      time_interval INTERVAL DEFAULT INTERVAL '1 hour'
    )
    RETURNS DECIMAL(5,4) AS $$
    BEGIN
      RETURN (
        SELECT AVG(sentiment_score * confidence)
        FROM social_data.sentiment_scores
        WHERE symbol = symbol_param
          AND time >= NOW() - time_interval
      );
    END;
    $$ LANGUAGE plpgsql;
    
  05-create-users.sql: |
    -- Create application users with appropriate permissions
    
    -- Read-only user for analytics
    CREATE USER coinet_analytics WITH PASSWORD 'analytics-readonly-2024!';
    GRANT CONNECT ON DATABASE coinet_timeseries TO coinet_analytics;
    GRANT USAGE ON SCHEMA market_data, social_data, news_data, onchain_data, analytics TO coinet_analytics;
    GRANT SELECT ON ALL TABLES IN SCHEMA market_data, social_data, news_data, onchain_data, analytics TO coinet_analytics;
    
    -- Read-write user for ingestion services
    CREATE USER coinet_ingest WITH PASSWORD 'ingest-readwrite-2024!';
    GRANT CONNECT ON DATABASE coinet_timeseries TO coinet_ingest;
    GRANT USAGE ON SCHEMA market_data, social_data, news_data, onchain_data TO coinet_ingest;
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA market_data, social_data, news_data, onchain_data TO coinet_ingest;
    
    -- Application user for context service
    CREATE USER coinet_context WITH PASSWORD 'context-app-2024!';
    GRANT CONNECT ON DATABASE coinet_timeseries TO coinet_context;
    GRANT USAGE ON SCHEMA market_data, social_data, news_data, onchain_data, analytics TO coinet_context;
    GRANT SELECT ON ALL TABLES IN SCHEMA market_data, social_data, news_data, onchain_data, analytics TO coinet_context;
    GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA market_data, social_data, news_data, onchain_data TO coinet_context; 