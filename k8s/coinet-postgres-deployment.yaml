apiVersion: apps/v1
kind: Deployment
metadata:
  name: coinet-postgres
  labels:
    app: coinet-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coinet-postgres
  template:
    metadata:
      labels:
        app: coinet-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: coinet
            - name: POSTGRES_USER
              value: coinet
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coinet-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - coinet
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - coinet
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: coinet-postgres-pvc 