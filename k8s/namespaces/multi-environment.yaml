# =============================================================================
# COINET AI MULTI-ENVIRONMENT NAMESPACES
# Complete namespace setup with resource quotas, network policies, and RBAC
# =============================================================================

---
# Development Environment Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coinet-dev
  labels:
    environment: "dev"
    project: "coinet-ai"
    tier: "development"
    network-policy: "enabled"
    resource-quota: "enabled"
  annotations:
    description: "Development environment for Coinet AI platform"
    contact: "platform-team@coinet.ai"
    cost-center: "engineering"

---
# Staging Environment Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coinet-staging
  labels:
    environment: "staging"
    project: "coinet-ai"
    tier: "pre-production"
    network-policy: "enabled"
    resource-quota: "enabled"
  annotations:
    description: "Staging environment for Coinet AI platform"
    contact: "platform-team@coinet.ai"
    cost-center: "engineering"

---
# Production Environment Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coinet-production
  labels:
    environment: "production"
    project: "coinet-ai"
    tier: "production"
    network-policy: "enabled"
    resource-quota: "enabled"
  annotations:
    description: "Production environment for Coinet AI platform"
    contact: "platform-team@coinet.ai"
    cost-center: "production"

---
# Monitoring Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coinet-monitoring
  labels:
    environment: "monitoring"
    project: "coinet-ai"
    tier: "infrastructure"
    network-policy: "enabled"
    resource-quota: "enabled"
  annotations:
    description: "Monitoring and observability stack"
    contact: "platform-team@coinet.ai"
    cost-center: "infrastructure"

---
# Ingress Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coinet-ingress
  labels:
    environment: "ingress"
    project: "coinet-ai"
    tier: "infrastructure"
    network-policy: "enabled"
    resource-quota: "enabled"
  annotations:
    description: "Ingress controllers and load balancers"
    contact: "platform-team@coinet.ai"
    cost-center: "infrastructure"

---
# Security Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: coinet-security
  labels:
    environment: "security"
    project: "coinet-ai"
    tier: "infrastructure"
    network-policy: "enabled"
    resource-quota: "enabled"
  annotations:
    description: "Security tools and policies"
    contact: "security-team@coinet.ai"
    cost-center: "security"

---
# =============================================================================
# RESOURCE QUOTAS
# =============================================================================

# Development Environment Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-compute-quota
  namespace: coinet-dev
spec:
  hard:
    # Compute resources
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    
    # Storage resources
    requests.storage: 100Gi
    persistentvolumeclaims: "10"
    
    # Object counts
    pods: "20"
    services: "10"
    configmaps: "20"
    secrets: "20"
    replicationcontrollers: "5"
    deployments.apps: "10"
    services.loadbalancers: "2"

---
# Staging Environment Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-compute-quota
  namespace: coinet-staging
spec:
  hard:
    # Compute resources
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    
    # Storage resources
    requests.storage: 200Gi
    persistentvolumeclaims: "20"
    
    # Object counts
    pods: "40"
    services: "20"
    configmaps: "40"
    secrets: "40"
    replicationcontrollers: "10"
    deployments.apps: "20"
    services.loadbalancers: "3"

---
# Production Environment Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-compute-quota
  namespace: coinet-production
spec:
  hard:
    # Compute resources
    requests.cpu: "50"
    requests.memory: 100Gi
    limits.cpu: "100"
    limits.memory: 200Gi
    
    # Storage resources
    requests.storage: 1Ti
    persistentvolumeclaims: "50"
    
    # Object counts
    pods: "100"
    services: "50"
    configmaps: "100"
    secrets: "100"
    replicationcontrollers: "20"
    deployments.apps: "50"
    services.loadbalancers: "10"

---
# Monitoring Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-compute-quota
  namespace: coinet-monitoring
spec:
  hard:
    # Compute resources
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    
    # Storage resources
    requests.storage: 500Gi
    persistentvolumeclaims: "20"
    
    # Object counts
    pods: "50"
    services: "20"
    configmaps: "50"
    secrets: "50"

---
# =============================================================================
# NETWORK POLICIES
# =============================================================================

# Default Deny All Policy for Development
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: coinet-dev
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow Internal Communication in Development
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-dev
  namespace: coinet-dev
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          project: "coinet-ai"
    - podSelector: {}
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          project: "coinet-ai"
    - podSelector: {}
  - to: [] # Allow DNS
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to: [] # Allow HTTPS to external services
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
# Default Deny All Policy for Staging
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: coinet-staging
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow Internal Communication in Staging
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-staging
  namespace: coinet-staging
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          project: "coinet-ai"
    - podSelector: {}
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          project: "coinet-ai"
    - podSelector: {}
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
# Default Deny All Policy for Production
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: coinet-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Strict Production Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: production-network-policy
  namespace: coinet-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          environment: "production"
    - namespaceSelector:
        matchLabels:
          environment: "ingress"
    - namespaceSelector:
        matchLabels:
          environment: "monitoring"
    - podSelector: {}
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          environment: "production"
    - namespaceSelector:
        matchLabels:
          environment: "monitoring"
    - podSelector: {}
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
# =============================================================================
# RBAC CONFIGURATION
# =============================================================================

# Developer Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coinet-developer
  namespace: coinet-dev
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Developer Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coinet-developers
  namespace: coinet-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coinet-developer
subjects:
- kind: User
  name: developer
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: developers
  apiGroup: rbac.authorization.k8s.io

---
# Staging Operator Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coinet-staging-operator
  namespace: coinet-staging
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Staging Operator Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coinet-staging-operators
  namespace: coinet-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coinet-staging-operator
subjects:
- kind: User
  name: staging-operator
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: staging-operators
  apiGroup: rbac.authorization.k8s.io

---
# Production Operator Role (Read-only for non-platform team)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coinet-production-readonly
  namespace: coinet-production
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]

---
# Production Read-only Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coinet-production-readonly
  namespace: coinet-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coinet-production-readonly
subjects:
- kind: Group
  name: developers
  apiGroup: rbac.authorization.k8s.io

---
# Platform Admin Role (Full access to production)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coinet-platform-admin
  namespace: coinet-production
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---
# Platform Admin Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coinet-platform-admins
  namespace: coinet-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coinet-platform-admin
subjects:
- kind: Group
  name: platform-admins
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# SERVICE ACCOUNTS
# =============================================================================

# AI Service Account for ML workloads
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coinet-ai-service
  namespace: coinet-production
  labels:
    app: coinet-ai
    component: ml-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CoimetAIServiceRole

---
# Ingest Service Account for data ingestion
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coinet-ingest-service
  namespace: coinet-production
  labels:
    app: coinet-ai
    component: ingest-service
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CoimetIngestServiceRole

---
# Monitoring Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coinet-monitoring-service
  namespace: coinet-monitoring
  labels:
    app: coinet-ai
    component: monitoring
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/CoimetMonitoringServiceRole

---
# =============================================================================
# LIMIT RANGES
# =============================================================================

# Development Environment Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limit-range
  namespace: coinet-dev
spec:
  limits:
  - type: Container
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: 2
      memory: 4Gi
    min:
      cpu: 50m
      memory: 64Mi
  - type: Pod
    max:
      cpu: 4
      memory: 8Gi
  - type: PersistentVolumeClaim
    max:
      storage: 50Gi
    min:
      storage: 1Gi

---
# Staging Environment Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-limit-range
  namespace: coinet-staging
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 200m
      memory: 256Mi
    max:
      cpu: 4
      memory: 8Gi
    min:
      cpu: 100m
      memory: 128Mi
  - type: Pod
    max:
      cpu: 8
      memory: 16Gi
  - type: PersistentVolumeClaim
    max:
      storage: 100Gi
    min:
      storage: 1Gi

---
# Production Environment Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limit-range
  namespace: coinet-production
spec:
  limits:
  - type: Container
    default:
      cpu: 1
      memory: 1Gi
    defaultRequest:
      cpu: 500m
      memory: 512Mi
    max:
      cpu: 8
      memory: 16Gi
    min:
      cpu: 100m
      memory: 128Mi
  - type: Pod
    max:
      cpu: 16
      memory: 32Gi
  - type: PersistentVolumeClaim
    max:
      storage: 1Ti
    min:
      storage: 10Gi

---
# =============================================================================
# POD SECURITY POLICIES
# =============================================================================

# Development Pod Security Standard
apiVersion: v1
kind: Pod
metadata:
  name: pod-security-dev-template
  namespace: coinet-dev
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# Production Pod Security Standard
apiVersion: v1
kind: Pod
metadata:
  name: pod-security-production-template
  namespace: coinet-production
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted 