---
# =============================================================================
# SECRET ROTATION CONFIGURATION
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: coinet-secret-rotation-config
  namespace: coinet-platform
  labels:
    app: coinet-platform
    component: secret-rotation
data:
  rotation-schedule.yaml: |
    # Secret rotation schedule configuration
    secrets:
      jwt-secrets:
        rotation_interval: "24h"
        overlap_period: "2h"
        notification_channels: ["slack", "email"]
        
      database-secrets:
        rotation_interval: "30d"
        overlap_period: "24h"
        notification_channels: ["slack", "email", "pagerduty"]
        
      api-keys:
        rotation_interval: "90d"
        overlap_period: "7d"
        notification_channels: ["email"]
        
      tls-certificates:
        rotation_interval: "90d"
        overlap_period: "7d"
        notification_channels: ["slack", "email", "pagerduty"]

---
# =============================================================================
# SECRET SCANNING POLICY
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: coinet-secret-security
  labels:
    app: coinet-platform
    security-component: secret-scanning
spec:
  validationFailureAction: enforce
  background: true
  rules:
  # Prevent hardcoded secrets in manifests
  - name: no-hardcoded-secrets
    match:
      any:
      - resources:
          kinds:
          - Pod
          - Deployment
          - StatefulSet
          namespaces:
          - coinet-platform
    validate:
      message: "Hardcoded secrets are not allowed"
      deny:
        conditions:
        - key: "{{ request.object.spec.containers[?contains(env[?name == 'PASSWORD' || name == 'SECRET' || name == 'TOKEN'], value)] | length(@) }}"
          operator: GreaterThan
          value: 0

  # Require secret references
  - name: require-secret-refs
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - coinet-platform
    validate:
      message: "Sensitive environment variables must use secret references"
      pattern:
        spec:
          containers:
          - name: "*"
            env:
            - name: "DATABASE_URL"
              valueFrom:
                secretKeyRef:
                  name: "?*"
                  key: "?*"
