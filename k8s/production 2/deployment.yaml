apiVersion: v1
kind: Namespace
metadata:
  name: coinet-production
  labels:
    name: coinet-production
    environment: production
---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: coinet-config
  namespace: coinet-production
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service.coinet-production.svc.cluster.local"
  KAFKA_BROKERS: "kafka-0.kafka-headless.coinet-production.svc.cluster.local:9092"
  TIMESCALEDB_HOST: "timescaledb-service.coinet-production.svc.cluster.local"
  CLICKHOUSE_HOST: "clickhouse-service.coinet-production.svc.cluster.local"
---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: coinet-secrets
  namespace: coinet-production
type: Opaque
stringData:
  JWT_SECRET: "your-production-jwt-secret-here"
  REDIS_PASSWORD: "your-redis-password"
  TIMESCALEDB_PASSWORD: "your-timescaledb-password"
  OPENAI_API_KEY: "your-openai-api-key"
  BINANCE_API_KEY: "your-binance-api-key"
  COINGECKO_API_KEY: "your-coingecko-api-key"
  TWITTER_BEARER_TOKEN: "your-twitter-bearer-token"
  ETHERSCAN_API_KEY: "your-etherscan-api-key"
---
# Data Aggregator Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-aggregator
  namespace: coinet-production
  labels:
    app: data-aggregator
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-aggregator
  template:
    metadata:
      labels:
        app: data-aggregator
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: data-aggregator
        image: coinet/data-aggregator:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8004
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: coinet-config
        - secretRef:
            name: coinet-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: cache-volume
        emptyDir:
          sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: data-aggregator-service
  namespace: coinet-production
  labels:
    app: data-aggregator
spec:
  selector:
    app: data-aggregator
  ports:
  - port: 8004
    targetPort: 8004
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
# Ingest Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-service
  namespace: coinet-production
  labels:
    app: ingest-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingest-service
  template:
    metadata:
      labels:
        app: ingest-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
      - name: ingest
        image: coinet/ingest-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: coinet-config
        - secretRef:
            name: coinet-secrets
        env:
        - name: ENABLE_TIMESCALEDB_STORAGE
          value: "true"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-service
  namespace: coinet-production
  labels:
    app: ingest-service
spec:
  selector:
    app: ingest-service
  ports:
  - port: 8001
    targetPort: 8001
    name: http
  type: ClusterIP
---
# Context Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-service
  namespace: coinet-production
  labels:
    app: context-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: context-service
  template:
    metadata:
      labels:
        app: context-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
      - name: context
        image: coinet/context-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: coinet-config
        - secretRef:
            name: coinet-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: context-service
  namespace: coinet-production
  labels:
    app: context-service
spec:
  selector:
    app: context-service
  ports:
  - port: 8002
    targetPort: 8002
    name: http
  type: ClusterIP
---
# Coinet AI Service (Core AI Analysis Engine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coinet-ai-service
  namespace: coinet-production
  labels:
    app: coinet-ai-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: coinet-ai-service
  template:
    metadata:
      labels:
        app: coinet-ai-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: coinet-ai
        image: coinet/coinet-ai-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: coinet-config
        - secretRef:
            name: coinet-secrets
        env:
        - name: ENABLE_CORS
          value: "true"
        - name: RATE_LIMIT_REQUESTS
          value: "1000"
        - name: RATE_LIMIT_WINDOW
          value: "15"
        - name: REQUEST_TIMEOUT
          value: "60000"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: cache-volume
          mountPath: /app/cache
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: cache-volume
        emptyDir:
          sizeLimit: 2Gi
      - name: logs-volume
        emptyDir:
          sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: coinet-ai-service
  namespace: coinet-production
  labels:
    app: coinet-ai-service
spec:
  selector:
    app: coinet-ai-service
  ports:
  - port: 3001
    targetPort: 3001
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
# Web Client (Next.js)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  namespace: coinet-production
  labels:
    app: web-client
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
        version: v1
    spec:
      containers:
      - name: web
        image: coinet/web-client:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.coinet.ai"
        - name: NEXT_PUBLIC_WS_URL
          value: "wss://ws.coinet.ai"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-client-service
  namespace: coinet-production
  labels:
    app: web-client
spec:
  selector:
    app: web-client
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: ClusterIP
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-aggregator-hpa
  namespace: coinet-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-aggregator
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coinet-ai-hpa
  namespace: coinet-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coinet-ai-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 30
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-client-hpa
  namespace: coinet-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-client
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
---
# API Gateway Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: coinet-production
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      containers:
      - name: api-gateway
        image: coinet/api-gateway:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: coinet-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: coinet-production
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coinet-ingress
  namespace: coinet-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/websocket-services: "data-aggregator-service"
spec:
  tls:
  - hosts:
    - coinet.ai
    - api.coinet.ai
    - ws.coinet.ai
    secretName: coinet-tls
  rules:
  - host: coinet.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-client-service
            port:
              number: 80
  - host: api.coinet.ai
    http:
      paths:
      - path: /ingest
        pathType: Prefix
        backend:
          service:
            name: ingest-service
            port:
              number: 8001
      - path: /context
        pathType: Prefix
        backend:
          service:
            name: context-service
            port:
              number: 8002
      - path: /data
        pathType: Prefix
        backend:
          service:
            name: data-aggregator-service
            port:
              number: 8004
      - path: /ai
        pathType: Prefix
        backend:
          service:
            name: coinet-ai-service
            port:
              number: 3001
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: coinet-ai-service
            port:
              number: 3001
  - host: ws.coinet.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: data-aggregator-service
            port:
              number: 8004
