# AlertManager configuration for Coinet Platform
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@coinet.ai'
  smtp_auth_username: 'alerts@coinet.ai'
  smtp_auth_password: 'your-email-password'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'coinet-default'
  routes:
  - match:
      severity: critical
    receiver: 'coinet-critical'
    group_wait: 5s
    repeat_interval: 5m
  - match:
      team: security
    receiver: 'coinet-security'
    group_wait: 30s
  - match:
      team: platform
    receiver: 'coinet-platform'

receivers:
- name: 'coinet-default'
  email_configs:
  - to: 'engineering@coinet.ai'
    subject: '[Coinet Alert] {{ .GroupLabels.alertname }}'
    body: |
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Labels: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
      {{ end }}

- name: 'coinet-critical'
  email_configs:
  - to: 'engineering@coinet.ai,cto@coinet.ai'
    subject: '[CRITICAL] Coinet Platform Alert'
    body: |
      🚨 CRITICAL ALERT - Immediate attention required!
      
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Service: {{ .Labels.service }}
      Time: {{ .StartsAt }}
      {{ end }}

- name: 'coinet-security'
  email_configs:
  - to: 'security@coinet.ai'
    subject: '[SECURITY] Coinet Security Alert'
    body: |
      🛡️ SECURITY ALERT - Review required
      
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Severity: {{ .Labels.severity }}
      {{ end }}

- name: 'coinet-platform'
  email_configs:
  - to: 'platform@coinet.ai'
    subject: '[PLATFORM] Coinet Infrastructure Alert'
    body: |
      ⚙️ PLATFORM ALERT
      
      {{ range .Alerts }}
      Alert: {{ .Annotations.summary }}
      Description: {{ .Annotations.description }}
      Service: {{ .Labels.service }}
      {{ end }}
