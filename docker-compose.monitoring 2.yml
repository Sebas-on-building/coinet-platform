# =============================================================================
# COINET PLATFORM - MONITORING STACK (Docker Compose)
# =============================================================================
# Complete monitoring stack with Prometheus, Grafana, and AlertManager
# for local development and testing
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # PROMETHEUS - METRICS COLLECTION
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: coinet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - coinet-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # GRAFANA - VISUALIZATION
  # =============================================================================
  grafana:
    image: grafana/grafana:10.0.0
    container_name: coinet-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=coinet-admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/coinet-platform-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - coinet-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - prometheus

  # =============================================================================
  # ALERTMANAGER - ALERTING
  # =============================================================================
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: coinet-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - coinet-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # NODE EXPORTER - SYSTEM METRICS
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: coinet-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - coinet-monitoring
    restart: unless-stopped

  # =============================================================================
  # POSTGRES EXPORTER - DATABASE METRICS
  # =============================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: coinet-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://coinet_user:coinet_password@postgres:5432/coinet_ai_dev?sslmode=disable
    networks:
      - coinet-monitoring
      - default
    restart: unless-stopped
    depends_on:
      - postgres

  # =============================================================================
  # REDIS EXPORTER - CACHE METRICS
  # =============================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.52.0
    container_name: coinet-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - coinet-monitoring
      - default
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

networks:
  coinet-monitoring:
    driver: bridge
    name: coinet-monitoring
