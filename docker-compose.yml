# =============================================================================
# COINET AI - DOCKER COMPOSE DEVELOPMENT ENVIRONMENT
# =============================================================================
#
# ⚠️  PRODUCTION WARNING: This file uses development defaults.
#     For production, override these via .env or -e:
#       JWT_SECRET=<openssl rand -base64 32>
#       NODE_ENV=production
#     Never use this compose file in production without setting JWT_SECRET.
#
# =============================================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coinet_ai_dev
      POSTGRES_USER: coinet_user
      POSTGRES_PASSWORD: coinet_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coinet_user -d coinet_ai_dev"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka for event streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Data Ingestion Service
  ingest-service:
    build: 
      context: .
      dockerfile: services/ingest/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - PORT=8001
      - DATABASE_URL=postgresql://coinet_user:coinet_password@postgres:5432/coinet_ai_dev
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./services/ingest/src:/app/src
      - /app/node_modules

  # Context Service
  context-service:
    build:
      context: .
      dockerfile: services/context/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - PORT=8002
      - DATABASE_URL=postgresql://coinet_user:coinet_password@postgres:5432/coinet_ai_dev
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/context/src:/app/src
      - /app/node_modules

  # Inference Service
  inference-service:
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - PORT=8003
      - DATABASE_URL=postgresql://coinet_user:coinet_password@postgres:5432/coinet_ai_dev
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/inference/src:/app/src
      - /app/node_modules

  # Feedback Service
  feedback-service:
    build:
      context: .
      dockerfile: services/feedback/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - NODE_ENV=development
      - PORT=8004
      - DATABASE_URL=postgresql://coinet_user:coinet_password@postgres:5432/coinet_ai_dev
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/feedback/src:/app/src
      - /app/node_modules

  # Industry-Leading User Service
  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=production
      - USE_DATABASE=true
      - PORT=8005
      - DATABASE_URL=postgresql://coinet_user:coinet_password@postgres:5432/coinet_ai_dev
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-coinet-super-secret-jwt-key-for-development}
      - LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/user/src:/app/src
      - ./services/user/logs:/app/logs
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Client
  web-client:
    build:
      context: .
      dockerfile: apps/web-client/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    volumes:
      - ./apps/web-client/src:/app/src
      - ./apps/web-client/public:/app/public
      - /app/node_modules
      - /app/.next

  # Professional API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - LOG_LEVEL=info
      - AUTH_SERVICE_URL=http://auth-service:8001
      - USER_SERVICE_URL=http://user-service:8005
      - DATA_SERVICE_URL=http://data-aggregator-service:8004
      - CONTEXT_SERVICE_URL=http://context-service:8002
      - INGEST_SERVICE_URL=http://ingest-service:8001
      - INFERENCE_SERVICE_URL=http://inference-service:8003
      - FEEDBACK_SERVICE_URL=http://feedback-service:8004
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      ingest-service:
        condition: service_started
      context-service:
        condition: service_started
      inference-service:
        condition: service_started
      feedback-service:
        condition: service_started
    volumes:
      - ./services/api-gateway/src:/app/src
      - ./services/api-gateway/logs:/app/logs
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Load Balancer (NGINX) - Optional for production
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: coinet-ai-network
