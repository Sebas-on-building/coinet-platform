version: '3.8'

services:
  # ===================================================================
  # DATABASE SERVICES
  # ===================================================================
  postgres:
    image: postgres:15-alpine
    container_name: coinet-postgres
    environment:
      POSTGRES_DB: coinet_db
      POSTGRES_USER: coinet
      POSTGRES_PASSWORD: coinet123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coinet-network

  mongodb:
    image: mongo:7
    container_name: coinet-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: coinet
      MONGO_INITDB_ROOT_PASSWORD: coinet123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - coinet-network

  redis:
    image: redis:7-alpine
    container_name: coinet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - coinet-network

  clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: coinet-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - coinet-network

  # ===================================================================
  # MESSAGE QUEUE SERVICES
  # ===================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: coinet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - coinet-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: coinet-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - coinet-network

  # ===================================================================
  # VECTOR DATABASES
  # ===================================================================
  weaviate:
    image: semitechnologies/weaviate:1.22.4
    container_name: coinet-weaviate
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: 'text2vec-openai,text2vec-cohere,text2vec-huggingface'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - coinet-network

  # ===================================================================
  # MONITORING SERVICES
  # ===================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: coinet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - coinet-network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: coinet-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - coinet-network

  # ===================================================================
  # APPLICATION SERVICES
  # ===================================================================
  web-client:
    build:
      context: ./apps/web-client
      dockerfile: Dockerfile
    container_name: coinet-web-client
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:3000/api
    volumes:
      - ./apps/web-client:/app
      - /app/node_modules
    depends_on:
      - postgres
      - mongodb
      - redis
      - kafka
    networks:
      - coinet-network

  context-service:
    build:
      context: ./services/context
      dockerfile: Dockerfile
    container_name: coinet-context-service
    ports:
      - "8006:8006"
    environment:
      - NODE_ENV=development
      - PORT=8006
      - DATABASE_URL=postgresql://coinet:coinet123@postgres:5432/coinet_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - coinet-network

  ingest-service:
    build:
      context: ./services/ingest
      dockerfile: Dockerfile
    container_name: coinet-ingest-service
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=development
      - PORT=8005
      - DATABASE_URL=postgresql://coinet:coinet123@postgres:5432/coinet_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - coinet-network

  inference-service:
    build:
      context: ./services/inference
      dockerfile: Dockerfile
    container_name: coinet-inference-service
    ports:
      - "8007:8007"
    environment:
      - NODE_ENV=development
      - PORT=8007
      - DATABASE_URL=postgresql://coinet:coinet123@postgres:5432/coinet_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
      - weaviate
    networks:
      - coinet-network

  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: coinet-ai-service
    ports:
      - "8008:8008"
    environment:
      - ENVIRONMENT=development
      - PORT=8008
      - DATABASE_URL=postgresql://coinet:coinet123@postgres:5432/coinet_db
      - REDIS_URL=redis://redis:6379
      - WEAVIATE_URL=http://weaviate:8080
    depends_on:
      - postgres
      - redis
      - weaviate
    networks:
      - coinet-network

# ===================================================================
# VOLUMES
# ===================================================================
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  clickhouse_data:
  weaviate_data:
  prometheus_data:
  grafana_data:

# ===================================================================
# NETWORKS
# ===================================================================
networks:
  coinet-network:
    driver: bridge 