openapi: 3.0.3
info:
  title: Coinet API
  version: 1.0.0
  description: >
    Modular, extensible, and production-grade API for Coinet, inspired by Apple, Canva, TradingView, and Solana.
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string }
        role: { type: string }
        permissions: { type: array, items: { type: string } }
    Portfolio:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        name: { type: string }
        holdings: { type: array, items: { $ref: '#/components/schemas/Holding' } }
    Holding:
      type: object
      properties:
        id: { type: string }
        portfolio_id: { type: string }
        symbol: { type: string }
        quantity: { type: number }
        avg_cost: { type: number }
    Alert:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        symbol: { type: string }
        condition: { type: string }
        target: { type: number }
    Strategy:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        name: { type: string }
        code: { type: string }
        description: { type: string }
    MarketTicker:
      type: object
      properties:
        symbol: { type: string }
        price: { type: number }
        timestamp: { type: string, format: date-time }
    MarketHistory:
      type: object
      properties:
        symbol: { type: string }
        timestamp: { type: string, format: date-time }
        open: { type: number }
        high: { type: number }
        low: { type: number }
        close: { type: number }
        volume: { type: number }
security:
  - bearerAuth: []
paths:
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
  /users/me:
    put:
      tags: [Users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
  /users:
    get:
      tags: [Users]
      summary: List all users (admin)
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/User' } } } } }
  /users/{id}:
    delete:
      tags: [Users]
      summary: Delete a user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /portfolios:
    post:
      tags: [Portfolios]
      summary: Create portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Portfolio' } } } }
    get:
      tags: [Portfolios]
      summary: List user portfolios
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Portfolio' } } } } }
  /portfolios/{id}:
    get:
      tags: [Portfolios]
      summary: Get portfolio details
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Portfolio' } } } }
    put:
      tags: [Portfolios]
      summary: Update (rename) portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Portfolio' } } } }
    delete:
      tags: [Portfolios]
      summary: Delete portfolio
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /portfolios/{id}/holdings:
    post:
      tags: [Portfolios]
      summary: Add/update holding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Holding'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Holding' } } } }
  /portfolios/{id}/holdings/{holdingId}:
    delete:
      tags: [Portfolios]
      summary: Remove a holding
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: holdingId
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /alerts:
    post:
      tags: [Alerts]
      summary: Create alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Alert' } } } }
    get:
      tags: [Alerts]
      summary: List user alerts
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Alert' } } } } }
  /alerts/{id}:
    put:
      tags: [Alerts]
      summary: Update alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Alert' } } } }
    delete:
      tags: [Alerts]
      summary: Delete alert
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /strategies:
    post:
      tags: [Strategies]
      summary: Create strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Strategy'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Strategy' } } } }
    get:
      tags: [Strategies]
      summary: List user strategies
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Strategy' } } } } }
  /strategies/{id}:
    put:
      tags: [Strategies]
      summary: Update strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Strategy'
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Strategy' } } } }
    delete:
      tags: [Strategies]
      summary: Delete strategy
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /strategies/{id}/run:
    post:
      tags: [Strategies]
      summary: Run strategy
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /strategies/{id}/backtest:
    post:
      tags: [Strategies]
      summary: Backtest strategy
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /market/ticker/{symbol}:
    get:
      tags: [Market]
      summary: Get ticker for a symbol
      parameters:
        - in: path
          name: symbol
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/MarketTicker' } } } }
  /market/history/{symbol}:
    get:
      tags: [Market]
      summary: Get historical data for a symbol
      parameters:
        - in: path
          name: symbol
          required: true
          schema: { type: string }
        - in: query
          name: from
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: interval
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/MarketHistory' } } } } }
  /market/subscribe:
    post:
      tags: [Market]
      summary: Subscribe to market updates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                symbol: { type: string }
      responses:
        '200': { description: OK }
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { token: { type: string }, refreshToken: { type: string } } } } } }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { token: { type: string } } } } } } 