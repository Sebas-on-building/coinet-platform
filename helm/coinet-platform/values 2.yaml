# Atomic, extensible, and beautiful values for Coinet Platform

# =============================================================================
# COINET PLATFORM - HELM VALUES WITH COMPREHENSIVE SECURITY
# =============================================================================

global:
  theme: "apple-canva-tradingview-solana"
  
  # Security configuration
  security:
    enabled: true
    level: "enterprise"
    compliance: ["SOC2", "GDPR", "PCI-DSS"]
  colorTokens:
    primary: "#0A84FF"
    secondary: "#30D158"
    accent: "#FFD60A"
    background: "#F2F2F7"
    surface: "#FFFFFF"
    error: "#FF453A"
    info: "#64D2FF"
    success: "#30D158"
    warning: "#FFD60A"
  typography:
    fontFamily: "San Francisco, Inter, Roboto, Arial, sans-serif"
    fontSize: 16
    fontWeight: 400
    headings:
      h1: 48
      h2: 36
      h3: 28
      h4: 22
      h5: 18
      h6: 16
  spacing:
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
  radii:
    sm: 4
    md: 8
    lg: 16
  shadows:
    sm: "0 1px 2px rgba(0,0,0,0.05)"
    md: "0 4px 8px rgba(0,0,0,0.10)"
    lg: "0 8px 24px rgba(0,0,0,0.15)"
  motion:
    fast: 100ms
    normal: 250ms
    slow: 500ms

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
security:
  enabled: true
  level: "enterprise"
  
  # Pod Security Standards
  podSecurityStandards:
    enabled: true
    enforce: "restricted"
    audit: "restricted"
    warn: "restricted"
  
  # Network Policies
  networkPolicies:
    enabled: true
    defaultDeny: true
    allowMonitoring: true
    allowDNS: true
    allowHTTPS: true
  
  # Security Context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: "RuntimeDefault"
  
  # Image Security
  imagePolicy:
    enforceRegistry: true
    allowedRegistries:
      - "registry.coinet.ai"
      - "docker.io/library"
      - "gcr.io/distroless"
    disallowLatestTag: true
    requireVulnerabilityScanning: true

# =============================================================================
# TLS CONFIGURATION
# =============================================================================
tls:
  enabled: true
  
  # External TLS (ingress)
  external:
    enabled: true
    issuer:
      name: "coinet-letsencrypt-prod"
      kind: "ClusterIssuer"
    dnsNames:
      - "coinet.ai"
      - "api.coinet.ai"
      - "app.coinet.ai"
      - "admin.coinet.ai"
    duration: "2160h"  # 90 days
    renewBefore: "360h"  # 15 days
  
  # Internal TLS (service-to-service)
  internal:
    enabled: true
    issuer:
      name: "coinet-internal-ca"
      kind: "ClusterIssuer"
    mtls: true
    
  # TLS settings
  settings:
    minVersion: "1.2"
    preferredVersion: "1.3"
    cipherSuites:
      - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
    hsts:
      enabled: true
      maxAge: 31536000
      includeSubdomains: true
      preload: true

# =============================================================================
# JWT ROTATION CONFIGURATION
# =============================================================================
jwt:
  rotation:
    enabled: true
    interval: "24h"
    overlapPeriod: "2h"
    algorithm: "RS256"
    keySize: 2048
    maxKeys: 5
  
  secrets:
    primary: "coinet-super-secure-jwt-key-primary-v1-2024"
    secondary: "coinet-super-secure-jwt-key-secondary-v1-2024"
    rotation: "coinet-super-secure-jwt-key-rotation-v1-2024"
  
  rotationSchedule: "0 2 * * *"  # Daily at 2 AM

# =============================================================================
# SECRETS MANAGEMENT
# =============================================================================
secrets:
  create: true
  encryption:
    enabled: true
    provider: "aescbc"
  
  # External secrets (these should be provided via external-secrets operator)
  external:
    enabled: true
    provider: "aws-secrets-manager"  # or "vault", "azure-keyvault"
    
  data:
    # Database credentials
    postgres-username: "coinet_user"
    postgres-password: "coinet_password_2024"
    postgres-database: "coinet_ai_prod"
    redis-password: "coinet_redis_password_2024"
    
    # External API keys
    openai-api-key: "sk-proj-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    anthropic-api-key: "sk-ant-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    sentry-dsn: "https://example@sentry.io/project"
    
    # Email & notifications
    smtp-username: "alerts@coinet.ai"
    smtp-password: "smtp_password_2024"
    slack-webhook: "https://hooks.slack.com/services/TXXXXXXX/BXXXXXXX/XXXXXXXXXXXXXXXXXXXXXXXX"

api:
  enabled: true
  replicas: 3
  canary:
    enabled: true
    weight: 10
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpu: 60
    memory: 70
  pdb:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: true
