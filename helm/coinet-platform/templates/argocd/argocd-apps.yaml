apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coinet-platform
spec:
  project: default
  source:
    repoURL: 'https://github.com/coinet/coinet-platform'
    targetRevision: HEAD
    path: helm/coinet-platform
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: coinet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 