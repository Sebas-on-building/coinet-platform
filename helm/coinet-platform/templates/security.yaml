# =============================================================================
# COINET PLATFORM - HELM SECURITY TEMPLATE
# =============================================================================
# Security configurations deployed via Helm chart
# =============================================================================

{{- if .Values.security.enabled }}

# =============================================================================
# NETWORK POLICIES
# =============================================================================
{{- if .Values.security.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "coinet-platform.fullname" . }}-api-gateway-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: {{ include "coinet-platform.fullname" . }}-api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.ingress.namespace | default "ingress-nginx" }}
    {{- if .Values.monitoring.enabled }}
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.monitoring.namespace | default "coinet-monitoring" }}
    {{- end }}
    ports:
    - protocol: TCP
      port: {{ .Values.apiGateway.service.port }}
  egress:
  - to:
    - podSelector:
        matchLabels:
          tier: core
    - podSelector:
        matchLabels:
          tier: data
    - podSelector:
        matchLabels:
          tier: ai
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "coinet-platform.fullname" . }}-user-service-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: {{ include "coinet-platform.fullname" . }}-user-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: {{ include "coinet-platform.fullname" . }}-api-gateway
    {{- if .Values.monitoring.enabled }}
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.monitoring.namespace | default "coinet-monitoring" }}
    {{- end }}
    ports:
    - protocol: TCP
      port: {{ .Values.userService.service.port }}
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: {{ .Values.postgresql.name | default "postgres" }}
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: {{ .Values.redis.name | default "redis" }}
    ports:
    - protocol: TCP
      port: 6379
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
{{- end }}

---
# =============================================================================
# TLS CERTIFICATES
# =============================================================================
{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "coinet-platform.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: tls
spec:
  secretName: {{ include "coinet-platform.fullname" . }}-tls-secret
  issuerRef:
    name: {{ .Values.tls.issuer.name }}
    kind: {{ .Values.tls.issuer.kind | default "ClusterIssuer" }}
  dnsNames:
  {{- range .Values.tls.dnsNames }}
  - {{ . }}
  {{- end }}
  duration: {{ .Values.tls.duration | default "2160h" }}
  renewBefore: {{ .Values.tls.renewBefore | default "360h" }}

---
# Internal service certificates
{{- range .Values.services }}
{{- if .tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "coinet-platform.fullname" $ }}-{{ .name }}-tls
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" $ | nindent 4 }}
    component: service-tls
    service: {{ .name }}
spec:
  secretName: {{ include "coinet-platform.fullname" $ }}-{{ .name }}-tls-secret
  issuerRef:
    name: {{ $.Values.tls.internalIssuer.name }}
    kind: {{ $.Values.tls.internalIssuer.kind | default "ClusterIssuer" }}
  dnsNames:
  - {{ .name }}.{{ $.Release.Namespace }}.svc.cluster.local
  duration: {{ .tls.duration | default "2160h" }}
  renewBefore: {{ .tls.renewBefore | default "360h" }}
---
{{- end }}
{{- end }}
{{- end }}

---
# =============================================================================
# SECRETS
# =============================================================================
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coinet-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: secrets
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}

---
# JWT rotation secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coinet-platform.fullname" . }}-jwt-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: jwt-rotation
type: Opaque
data:
  jwt-secret-primary: {{ .Values.jwt.secrets.primary | b64enc }}
  jwt-secret-secondary: {{ .Values.jwt.secrets.secondary | b64enc }}
  jwt-secret-rotation: {{ .Values.jwt.secrets.rotation | b64enc }}
  jwt-rotation-schedule: {{ .Values.jwt.rotationSchedule | b64enc }}
{{- end }}

---
# =============================================================================
# RBAC
# =============================================================================
{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "coinet-platform.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: rbac
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "coinet-platform.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: rbac
rules:
{{- with .Values.rbac.rules }}
  {{- toYaml . | nindent 2 }}
{{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "coinet-platform.fullname" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "coinet-platform.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "coinet-platform.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

---
# =============================================================================
# POD SECURITY STANDARDS
# =============================================================================
{{- if .Values.security.podSecurityStandards.enabled }}
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "coinet-platform.fullname" . }}-limits
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: security
spec:
  limits:
  - type: Container
    default:
      cpu: {{ .Values.resources.limits.cpu | default "500m" }}
      memory: {{ .Values.resources.limits.memory | default "512Mi" }}
      ephemeral-storage: {{ .Values.resources.limits.ephemeralStorage | default "1Gi" }}
    defaultRequest:
      cpu: {{ .Values.resources.requests.cpu | default "100m" }}
      memory: {{ .Values.resources.requests.memory | default "128Mi" }}
      ephemeral-storage: {{ .Values.resources.requests.ephemeralStorage | default "100Mi" }}
    max:
      cpu: {{ .Values.resources.max.cpu | default "2" }}
      memory: {{ .Values.resources.max.memory | default "4Gi" }}
      ephemeral-storage: {{ .Values.resources.max.ephemeralStorage | default "10Gi" }}

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ include "coinet-platform.fullname" . }}-quota
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coinet-platform.labels" . | nindent 4 }}
    component: security
spec:
  hard:
    requests.cpu: {{ .Values.resourceQuota.requests.cpu | default "10" }}
    requests.memory: {{ .Values.resourceQuota.requests.memory | default "20Gi" }}
    limits.cpu: {{ .Values.resourceQuota.limits.cpu | default "20" }}
    limits.memory: {{ .Values.resourceQuota.limits.memory | default "40Gi" }}
    persistentvolumeclaims: {{ .Values.resourceQuota.pvc | default "10" }}
    pods: {{ .Values.resourceQuota.pods | default "50" }}
    services: {{ .Values.resourceQuota.services | default "20" }}
    secrets: {{ .Values.resourceQuota.secrets | default "50" }}
{{- end }}

{{- end }}
