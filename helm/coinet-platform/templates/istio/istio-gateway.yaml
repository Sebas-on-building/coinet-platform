apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: coinet-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "coinet.com"
        - "api.coinet.com"
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "coinet.com"
        - "api.coinet.com"
      tls:
        mode: SIMPLE
        credentialName: coinet-tls 