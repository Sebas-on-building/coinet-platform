# =============================================================================
# COINET USER SERVICE - HELM VALUES
# =============================================================================
# Production-ready configuration with comprehensive resource management,
# autoscaling, monitoring, and security features
# =============================================================================

# =============================================================================
# GLOBAL CONFIGURATION
# =============================================================================
global:
  imageRegistry: "registry.coinet.ai"
  imagePullSecrets: 
    - name: coinet-registry-secret
  storageClass: "fast-ssd"
  
# =============================================================================
# IMAGE CONFIGURATION
# =============================================================================
image:
  registry: "registry.coinet.ai"
  repository: "user-service"
  tag: "1.0.0"
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: coinet-registry-secret

# =============================================================================
# DEPLOYMENT CONFIGURATION
# =============================================================================
replicaCount: 3

deployment:
  # Deployment strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8005"
    prometheus.io/path: "/metrics"
    sidecar.istio.io/inject: "true"
    security.coinet.ai/tier: "core"
    security.coinet.ai/component: "user-service"
  
  # Pod labels
  podLabels:
    app: coinet-user-service
    tier: core
    component: user-service
    version: v1
    security-tier: critical

# =============================================================================
# SERVICE CONFIGURATION
# =============================================================================
service:
  type: ClusterIP
  port: 8005
  targetPort: 8005
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
  labels:
    monitoring: "enabled"
    security: "tls"

# =============================================================================
# INGRESS CONFIGURATION
# =============================================================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: coinet-letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: users.coinet.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: coinet-user-service-tls
      hosts:
        - users.coinet.ai

# =============================================================================
# RESOURCE MANAGEMENT
# =============================================================================
resources:
  # Resource requests (guaranteed)
  requests:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 100Mi
  
  # Resource limits (maximum)
  limits:
    cpu: 1000m
    memory: 1Gi
    ephemeral-storage: 1Gi

# =============================================================================
# HORIZONTAL POD AUTOSCALER (HPA)
# =============================================================================
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  
  # CPU-based scaling
  targetCPUUtilizationPercentage: 70
  
  # Memory-based scaling
  targetMemoryUtilizationPercentage: 80
  
  # Custom metrics scaling
  metrics:
    - type: Pods
      pods:
        metric:
          name: coinet_user_active_sessions
        target:
          type: AverageValue
          averageValue: "100"
    - type: Pods
      pods:
        metric:
          name: coinet_user_http_requests_per_second
        target:
          type: AverageValue
          averageValue: "50"
  
  # Scaling behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60

# =============================================================================
# HEALTH PROBES
# =============================================================================
healthProbes:
  # Liveness probe - restart container if unhealthy
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8005
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3
  
  # Readiness probe - remove from service if not ready
  readinessProbe:
    enabled: true
    httpGet:
      path: /ready
      port: 8005
      scheme: HTTP
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3
  
  # Startup probe - allow slow startup
  startupProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8005
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 30

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
securityContext:
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  
  # Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================
env:
  # Application environment
  NODE_ENV: "production"
  USE_DATABASE: "true"
  PORT: "8005"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  
  # JWT configuration
  JWT_ROTATION_INTERVAL: "86400000"  # 24 hours
  JWT_ALGORITHM: "RS256"
  JWT_KEY_SIZE: "2048"
  JWT_MAX_KEYS: "5"
  
  # Kafka configuration
  KAFKA_ENABLED: "true"
  KAFKA_TOPIC_PREFIX: "coinet"
  
  # Analytics configuration
  CLICKHOUSE_ENABLED: "true"
  TIMESCALEDB_ENABLED: "true"
  
  # Monitoring configuration
  SENTRY_ENVIRONMENT: "production"
  PROMETHEUS_ENABLED: "true"

# Environment variables from secrets
envFromSecrets:
  - name: coinet-database-secrets
    keys:
      - key: postgres-url
        name: DATABASE_URL
      - key: redis-url
        name: REDIS_URL
  
  - name: coinet-jwt-secrets
    keys:
      - key: jwt-secret-primary
        name: JWT_SECRET
  
  - name: coinet-external-api-secrets
    keys:
      - key: sentry-dsn
        name: SENTRY_DSN
      - key: kafka-brokers
        name: KAFKA_BROKERS
      - key: clickhouse-url
        name: CLICKHOUSE_URL
      - key: timescaledb-url
        name: TIMESCALEDB_URL

# =============================================================================
# VOLUMES AND PERSISTENCE
# =============================================================================
volumes:
  # Temporary storage for logs and cache
  - name: tmp
    emptyDir:
      sizeLimit: 1Gi
  - name: logs
    emptyDir:
      sizeLimit: 500Mi

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: logs
    mountPath: /app/logs

# =============================================================================
# SERVICE ACCOUNT AND RBAC
# =============================================================================
serviceAccount:
  create: true
  automount: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT:role/coinet-user-service-role"
  name: "coinet-user-service"

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["secrets", "configmaps"]
      verbs: ["get", "list"]
      resourceNames: ["coinet-database-secrets", "coinet-jwt-secrets"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["create"]
    - apiGroups: ["metrics.k8s.io"]
      resources: ["pods", "nodes"]
      verbs: ["get", "list"]

# =============================================================================
# POD DISRUPTION BUDGET
# =============================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  # maxUnavailable: 1  # Alternative to minAvailable

# =============================================================================
# NETWORK POLICY
# =============================================================================
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow ingress from API Gateway
    - from:
      - podSelector:
          matchLabels:
            app: coinet-api-gateway
      ports:
      - protocol: TCP
        port: 8005
    
    # Allow monitoring
    - from:
      - namespaceSelector:
          matchLabels:
            name: coinet-monitoring
      ports:
      - protocol: TCP
        port: 8005
  
  egress:
    # Allow egress to databases
    - to:
      - podSelector:
          matchLabels:
            app: postgres
      ports:
      - protocol: TCP
        port: 5432
    
    - to:
      - podSelector:
          matchLabels:
            app: redis
      ports:
      - protocol: TCP
        port: 6379
    
    # Allow DNS resolution
    - to: []
      ports:
      - protocol: UDP
        port: 53
    
    # Allow HTTPS for external APIs
    - to: []
      ports:
      - protocol: TCP
        port: 443

# =============================================================================
# MONITORING CONFIGURATION
# =============================================================================
monitoring:
  # ServiceMonitor for Prometheus
  serviceMonitor:
    enabled: true
    namespace: coinet-monitoring
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
    labels:
      app: coinet-user-service
      tier: core
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: 'coinet_user_(.*)'
        targetLabel: service
        replacement: 'user-service'
  
  # Grafana dashboard
  grafanaDashboard:
    enabled: true
    namespace: coinet-monitoring
    labels:
      grafana_dashboard: "1"

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
postgresql:
  enabled: true
  auth:
    postgresPassword: "postgres_password_2024"
    username: "coinet_user"
    password: "coinet_password_2024"
    database: "coinet_ai_prod"
  
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "fast-ssd"
    
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: coinet-monitoring

redis:
  enabled: true
  auth:
    enabled: true
    password: "redis_password_2024"
  
  master:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "fast-ssd"
    
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: coinet-monitoring

# =============================================================================
# ADVANCED FEATURES
# =============================================================================

# Vertical Pod Autoscaler (VPA)
verticalPodAutoscaler:
  enabled: true
  updateMode: "Auto"  # Auto, Recreation, Initial, Off
  
  # Resource recommendations
  resourcePolicy:
    containerPolicies:
    - containerName: user-service
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      minAllowed:
        cpu: 100m
        memory: 128Mi
      controlledResources: ["cpu", "memory"]

# Pod Anti-Affinity for high availability
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - coinet-user-service
        topologyKey: kubernetes.io/hostname

# Node selection
nodeSelector:
  kubernetes.io/arch: amd64
  node-type: application

# Tolerations for dedicated nodes
tolerations:
  - key: "coinet.ai/dedicated"
    operator: "Equal"
    value: "user-service"
    effect: "NoSchedule"

# =============================================================================
# CONFIGURATION
# =============================================================================
config:
  # Application configuration
  app:
    name: "Coinet User Service"
    version: "1.0.0"
    environment: "production"
    debug: false
  
  # Security configuration
  security:
    jwtRotationEnabled: true
    twoFactorRequired: false
    passwordPolicy:
      minLength: 8
      requireUppercase: true
      requireLowercase: true
      requireNumbers: true
      requireSymbols: false
    
    rateLimiting:
      enabled: true
      windowMs: 900000  # 15 minutes
      maxRequests: 1000
      skipSuccessfulRequests: false
  
  # Features
  features:
    registration: true
    twoFactor: true
    apiKeys: true
    adminPanel: true
    analytics: true
    auditLogs: true

# =============================================================================
# EXTERNAL DEPENDENCIES
# =============================================================================
externalServices:
  # Kafka for event streaming
  kafka:
    enabled: true
    brokers: "kafka.coinet-platform.svc.cluster.local:9092"
    ssl: true
    sasl:
      mechanism: "SCRAM-SHA-256"
      username: "coinet-user-service"
  
  # Analytics databases
  clickhouse:
    enabled: true
    url: "http://clickhouse.coinet-platform.svc.cluster.local:8123"
    database: "coinet_analytics"
    username: "coinet_analytics"
  
  timescaledb:
    enabled: true
    url: "postgresql://timescaledb.coinet-platform.svc.cluster.local:5432/coinet_timeseries"
    username: "coinet_timeseries"
  
  # External APIs
  sentry:
    enabled: true
    environment: "production"
    tracesSampleRate: 0.1
    profilesSampleRate: 0.1

# =============================================================================
# TESTING CONFIGURATION
# =============================================================================
testing:
  # k6 performance tests
  k6:
    enabled: true
    scenarios:
      - name: "smoke-test"
        vus: 5
        duration: "30s"
        endpoints: ["/health", "/ready"]
      
      - name: "load-test"
        vus: 50
        duration: "5m"
        endpoints: ["/auth/login", "/users/me"]
      
      - name: "stress-test"
        vus: 100
        duration: "10m"
        rampUp: "2m"
        rampDown: "2m"
  
  # Health check validation
  healthChecks:
    enabled: true
    timeout: 30s
    retries: 3

# =============================================================================
# BACKUP AND DISASTER RECOVERY
# =============================================================================
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: "30d"
  destination: "s3://coinet-backups/user-service"

# =============================================================================
# MIGRATION CONFIGURATION
# =============================================================================
migrations:
  enabled: true
  
  # Pre-install hook for migrations
  preInstall:
    enabled: true
    image:
      repository: "registry.coinet.ai/user-service-migrations"
      tag: "1.0.0"
    
    # Migration job configuration
    job:
      backoffLimit: 3
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 300
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# =============================================================================
# ENVIRONMENT-SPECIFIC OVERRIDES
# =============================================================================
environments:
  development:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    env:
      NODE_ENV: "development"
      LOG_LEVEL: "debug"
  
  staging:
    replicaCount: 2
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 750m
        memory: 768Mi
    env:
      NODE_ENV: "staging"
      LOG_LEVEL: "info"
  
  production:
    replicaCount: 3
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env:
      NODE_ENV: "production"
      LOG_LEVEL: "warn"

# =============================================================================
# EXTERNAL SECRET REFERENCE
# =============================================================================
existingSecret: ""

# =============================================================================
# EXTERNAL DATABASE CONFIGURATION
# =============================================================================
externalDatabase:
  url: ""

externalRedis:
  url: ""
