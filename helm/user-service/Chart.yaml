apiVersion: v2
name: coinet-user-service
description: Enterprise-grade User Service for Coinet AI Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://coinet.ai
sources:
  - https://github.com/coinet/platform
maintainers:
  - name: Coinet Engineering Team
    email: engineering@coinet.ai
    url: https://coinet.ai
keywords:
  - coinet
  - user-service
  - authentication
  - microservices
  - kubernetes
  - fintech
  - cryptocurrency
annotations:
  category: Authentication
  licenses: MIT
  images: |
    - name: user-service
      image: registry.coinet.ai/user-service:1.0.0
dependencies:
  - name: postgresql
    version: "12.1.9"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.1.5" 
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
