apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "user-service.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-service.labels" . | nindent 4 }}
    component: configuration
data:
  # Application configuration
  app-config.yaml: |
    {{- toYaml .Values.config | nindent 4 }}
  
  # Logging configuration
  logging-config.yaml: |
    level: {{ .Values.env.LOG_LEVEL | default "info" }}
    format: json
    outputs:
      - console
      - file
    file:
      path: /app/logs/user-service.log
      maxSize: 100MB
      maxAge: 7
      maxBackups: 5
      compress: true
  
  # Security configuration
  security-config.yaml: |
    jwt:
      algorithm: {{ .Values.env.JWT_ALGORITHM | default "RS256" }}
      rotation:
        enabled: {{ .Values.config.security.jwtRotationEnabled | default true }}
        interval: {{ .Values.env.JWT_ROTATION_INTERVAL | default "86400000" }}
    
    rateLimit:
      enabled: {{ .Values.config.security.rateLimiting.enabled | default true }}
      windowMs: {{ .Values.config.security.rateLimiting.windowMs | default 900000 }}
      maxRequests: {{ .Values.config.security.rateLimiting.maxRequests | default 1000 }}
    
    passwordPolicy:
      {{- toYaml .Values.config.security.passwordPolicy | nindent 6 }}
  
  # Feature flags
  features.yaml: |
    {{- toYaml .Values.config.features | nindent 4 }}
  
  # External service configuration
  external-services.yaml: |
    {{- toYaml .Values.externalServices | nindent 4 }}
