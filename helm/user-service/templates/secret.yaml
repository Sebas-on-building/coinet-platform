{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "user-service.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-service.labels" . | nindent 4 }}
    component: secrets
type: Opaque
data:
  # Database connection
  database_url: {{ include "user-service.databaseUrl" . | b64enc }}
  
  # Redis connection
  redis_url: {{ include "user-service.redisUrl" . | b64enc }}
  
  # JWT secrets
  jwt_secret: {{ "coinet-jwt-secret-2024" | b64enc }}
  
  # Sentry DSN
  sentry_dsn: {{ "https://example@sentry.io/project" | b64enc }}
{{- end }}
