apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "user-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-service.labels" . | nindent 4 }}
  annotations:
    deployment.kubernetes.io/revision: "{{ .Release.Revision }}"
    meta.helm.sh/release-name: "{{ .Release.Name }}"
    meta.helm.sh/release-namespace: "{{ .Release.Namespace }}"
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.deployment.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "user-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.deployment.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "user-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.deployment.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "user-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext.podSecurityContext | nindent 8 }}
      
      # Init containers for migrations and setup
      {{- if .Values.migrations.enabled }}
      initContainers:
      - name: database-migration
        image: "{{ .Values.migrations.preInstall.image.repository }}:{{ .Values.migrations.preInstall.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
          - |
            echo "🔄 Running database migrations..."
            npx prisma migrate deploy
            echo "✅ Database migrations completed"
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: {{ include "user-service.fullname" . }}-secrets
                key: database-url
        resources:
          {{- toYaml .Values.migrations.preInstall.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.securityContext.containerSecurityContext | nindent 10 }}
      {{- end }}
      
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        
        # Environment variables
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        
        # Environment variables from secrets
        {{- range .Values.envFromSecrets }}
        {{- range .keys }}
        - name: {{ .name }}
          valueFrom:
            secretKeyRef:
              name: {{ $.name }}
              key: {{ .key }}
        {{- end }}
        {{- end }}
        
        # Health probes
        {{- if .Values.healthProbes.livenessProbe.enabled }}
        livenessProbe:
          {{- with .Values.healthProbes.livenessProbe.httpGet }}
          httpGet:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initialDelaySeconds: {{ .Values.healthProbes.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthProbes.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.healthProbes.livenessProbe.timeoutSeconds }}
          successThreshold: {{ .Values.healthProbes.livenessProbe.successThreshold }}
          failureThreshold: {{ .Values.healthProbes.livenessProbe.failureThreshold }}
        {{- end }}
        
        {{- if .Values.healthProbes.readinessProbe.enabled }}
        readinessProbe:
          {{- with .Values.healthProbes.readinessProbe.httpGet }}
          httpGet:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initialDelaySeconds: {{ .Values.healthProbes.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthProbes.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.healthProbes.readinessProbe.timeoutSeconds }}
          successThreshold: {{ .Values.healthProbes.readinessProbe.successThreshold }}
          failureThreshold: {{ .Values.healthProbes.readinessProbe.failureThreshold }}
        {{- end }}
        
        {{- if .Values.healthProbes.startupProbe.enabled }}
        startupProbe:
          {{- with .Values.healthProbes.startupProbe.httpGet }}
          httpGet:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initialDelaySeconds: {{ .Values.healthProbes.startupProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthProbes.startupProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.healthProbes.startupProbe.timeoutSeconds }}
          successThreshold: {{ .Values.healthProbes.startupProbe.successThreshold }}
          failureThreshold: {{ .Values.healthProbes.startupProbe.failureThreshold }}
        {{- end }}
        
        # Resource management
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        
        # Security context
        securityContext:
          {{- toYaml .Values.securityContext.containerSecurityContext | nindent 10 }}
        
        # Volume mounts
        volumeMounts:
        {{- range .Values.volumeMounts }}
        - name: {{ .name }}
          mountPath: {{ .mountPath }}
          {{- if .subPath }}
          subPath: {{ .subPath }}
          {{- end }}
          {{- if .readOnly }}
          readOnly: {{ .readOnly }}
          {{- end }}
        {{- end }}
      
      # Volumes
      volumes:
      {{- range .Values.volumes }}
      - name: {{ .name }}
        {{- if .emptyDir }}
        emptyDir:
          {{- toYaml .emptyDir | nindent 10 }}
        {{- else if .configMap }}
        configMap:
          {{- toYaml .configMap | nindent 10 }}
        {{- else if .secret }}
        secret:
          {{- toYaml .secret | nindent 10 }}
        {{- else if .persistentVolumeClaim }}
        persistentVolumeClaim:
          {{- toYaml .persistentVolumeClaim | nindent 10 }}
        {{- end }}
      {{- end }}
      
      # Node selection and affinity
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      # DNS configuration for service discovery
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
        - name: ndots
          value: "2"
        - name: edns0
      
      # Restart policy
      restartPolicy: Always
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
