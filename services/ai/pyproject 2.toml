[build-system]
requires = ["hatchling>=1.10.0"]
build-backend = "hatchling.build"

[project]
name = "coinet-ai-service"
version = "1.0.0"
description = "Coinet AI - Revolutionary AI/ML Service for Cryptocurrency Analytics"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Coinet AI Team", email = "dev@coinet.ai"},
]
maintainers = [
    {name = "Coinet AI Team", email = "dev@coinet.ai"},
]
keywords = [
    "coinet",
    "ai",
    "ml",
    "cryptocurrency",
    "trading",
    "fastapi",
    "openai",
    "anthropic",
    "google-ai",
    "langchain",
    "vector-database",
    "deepgram",
    "speech-recognition",
    "nlp",
    "machine-learning",
    "deep-learning",
    "time-series",
    "financial-analysis",
    "blockchain",
    "real-time",
    "microservice"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Office/Business :: Financial",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Framework :: FastAPI",
    "Framework :: AsyncIO",
]
requires-python = ">=3.9"
dependencies = [
    # Core Framework & API
    "fastapi>=0.104.1",
    "uvicorn[standard]>=0.24.0",
    "gunicorn>=21.2.0",
    "starlette>=0.27.0",
    "pydantic>=2.5.2",
    "pydantic-settings>=2.1.0",
    
    # AI/ML Core Libraries
    "openai>=1.6.1",
    "anthropic>=0.8.1",
    "google-generativeai>=0.3.2",
    "google-cloud-aiplatform>=1.38.1",
    
    # Vector Databases & Search
    "pinecone-client>=2.2.4",
    "weaviate-client>=3.25.3",
    "chromadb>=0.4.18",
    "qdrant-client>=1.7.0",
    "faiss-cpu>=1.7.4",
    
    # Speech & Audio Processing
    "deepgram-sdk>=3.2.7",
    "speechrecognition>=3.10.0",
    "pydub>=0.25.1",
    "librosa>=0.10.1",
    "soundfile>=0.12.1",
    "openai-whisper>=20231117",
    
    # LangChain & LLM Orchestration
    "langchain>=0.0.352",
    "langchain-core>=0.1.3",
    "langchain-community>=0.0.13",
    "langchain-openai>=0.0.2",
    "langchain-anthropic>=0.0.1",
    "langchain-google-genai>=0.0.1",
    "langchain-pinecone>=0.0.1",
    "langchain-weaviate>=0.0.1",
    "langchain-chroma>=0.0.1",
    
    # Machine Learning & Data Science
    "scikit-learn>=1.3.2",
    "pandas>=2.1.4",
    "numpy>=1.25.2",
    "scipy>=1.11.4",
    "matplotlib>=3.8.2",
    "seaborn>=0.13.0",
    "plotly>=5.17.0",
    
    # Deep Learning Frameworks
    "torch>=2.1.2",
    "torchvision>=0.16.2",
    "torchaudio>=2.1.2",
    "tensorflow>=2.15.0",
    "transformers>=4.36.2",
    "tokenizers>=0.15.0",
    "datasets>=2.16.1",
    
    # Natural Language Processing
    "nltk>=3.8.1",
    "spacy>=3.7.2",
    "textblob>=0.17.1",
    "gensim>=4.3.2",
    "sentence-transformers>=2.2.2",
    
    # Computer Vision
    "opencv-python>=4.8.1.78",
    "pillow>=10.1.0",
    "imageio>=2.33.1",
    "scikit-image>=0.22.0",
    
    # Time Series & Financial Analysis
    "ta>=0.10.2",
    "yfinance>=0.2.28",
    "pandas-ta>=0.3.14b0",
    "stockstats>=0.6.2",
    
    # Cryptocurrency & Blockchain
    "ccxt>=4.1.64",
    "web3>=6.13.0",
    "pycoingecko>=3.1.0",
    "binance-connector>=3.6.1",
    
