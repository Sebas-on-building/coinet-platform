[project.optional-dependencies]
dev = [
    "pytest>=7.4.3",
    "pytest-asyncio>=0.21.1",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "httpx>=0.25.2",
    "faker>=20.1.0",
    "factory-boy>=3.3.0",
    "black>=23.12.0",
    "isort>=5.13.2",
    "flake8>=6.1.0",
    "mypy>=1.8.0",
    "pre-commit>=3.6.0",
]
docs = [
    "sphinx>=7.2.6",
    "sphinx-rtd-theme>=2.0.0",
    "sphinx-autodoc-typehints>=1.25.2",
    "myst-parser>=2.0.0",
]
deployment = [
    "docker>=6.1.3",
    "kubernetes>=28.1.0",
    "boto3>=1.34.0",
    "google-cloud-storage>=2.10.0",
    "azure-storage-blob>=12.19.0",
]
notebooks = [
    "jupyter>=1.0.0",
    "ipython>=8.18.1",
    "notebook>=7.0.6",
    "jupyterlab>=4.0.9",
    "voila>=0.5.5",
]
visualization = [
    "streamlit>=1.28.2",
    "gradio>=4.8.0",
    "dash>=2.16.1",
    "bokeh>=3.3.2",
    "altair>=5.2.0",
]
gpu = [
    "torch[cuda]>=2.1.2",
    "tensorflow-gpu>=2.15.0",
    "cupy>=12.3.0",
    "cudf>=23.12.0",
    "rapids-singlecell>=0.9.0",
]
audio = [
    "pyaudio>=0.2.11",
    "webrtcvad>=2.0.10",
    "whisper>=1.1.10",
    "librosa>=0.10.1",
    "soundfile>=0.12.1",
]
blockchain = [
    "eth-account>=0.10.0",
    "bitcoin>=1.1.42",
    "kraken>=0.1.4",
]
graph = [
    "networkx>=3.2.1",
    "igraph>=0.11.3",
    "pyvis>=0.3.2",
]
all = [
    "coinet-ai-service[dev,docs,deployment,notebooks,visualization,gpu,audio,blockchain,graph]",
]

[project.urls]
Homepage = "https://coinet.ai"
Documentation = "https://docs.coinet.ai"
Repository = "https://github.com/coinet-ai/platform"
Issues = "https://github.com/coinet-ai/platform/issues"
Changelog = "https://github.com/coinet-ai/platform/blob/main/CHANGELOG.md"

[project.scripts]
coinet-ai = "coinet_ai.cli:main"
coinet-serve = "coinet_ai.server:serve"
coinet-train = "coinet_ai.training:train"
coinet-predict = "coinet_ai.inference:predict"

[tool.hatch.version]
path = "src/coinet_ai/__init__.py"

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/README.md",
    "/LICENSE",
    "/pyproject.toml",
]

[tool.hatch.build.targets.wheel]
packages = ["src/coinet_ai"]

[tool.hatch.envs.default]
dependencies = [
    "pytest>=7.4.3",
    "pytest-asyncio>=0.21.1",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "httpx>=0.25.2",
    "faker>=20.1.0",
    "factory-boy>=3.3.0",
]

[tool.hatch.envs.default.scripts]
test = "pytest {args:tests}"
test-cov = "pytest --cov=coinet_ai --cov-report=html --cov-report=term {args:tests}"
lint = "flake8 src tests"
format = "black src tests && isort src tests"
type-check = "mypy src"
serve = "uvicorn coinet_ai.main:app --reload --host 0.0.0.0 --port 8000"
serve-prod = "gunicorn coinet_ai.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"

[tool.hatch.envs.docs]
dependencies = [
    "sphinx>=7.2.6",
    "sphinx-rtd-theme>=2.0.0",
    "sphinx-autodoc-typehints>=1.25.2",
    "myst-parser>=2.0.0",
]

[tool.hatch.envs.docs.scripts]
build = "sphinx-build -b html docs docs/_build/html"
serve = "sphinx-autobuild docs docs/_build/html --host 0.0.0.0 --port 8080"

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88
known_first_party = ["coinet_ai"]
known_third_party = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "openai",
    "anthropic",
    "google",
    "langchain",
    "pinecone",
    "weaviate",
    "chromadb",
    "deepgram",
    "torch",
    "tensorflow",
    "transformers",
    "pandas",
    "numpy",
    "scipy",
    "scikit-learn",
    "matplotlib",
    "seaborn",
    "plotly",
]

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "E501", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
    ".venv",
    ".mypy_cache",
    ".pytest_cache",
]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
show_error_codes = true
show_error_context = true
pretty = true

[[tool.mypy.overrides]]
module = [
    "ccxt.*",
    "web3.*",
    "pycoingecko.*",
    "binance.*",
    "kraken.*",
    "deepgram.*",
    "whisper.*",
    "librosa.*",
    "soundfile.*",
    "pyaudio.*",
    "cv2.*",
    "sklearn.*",
    "ta.*",
    "yfinance.*",
    "backtrader.*",
    "zipline.*",
    "pyfolio.*",
    "empyrical.*",
    "quantlib.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
    "*_test.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "gpu: marks tests that require GPU",
    "audio: marks tests that require audio hardware",
    "blockchain: marks tests that require blockchain connectivity",
    "ai: marks tests that require AI API keys",
]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "tests/*",
    "src/coinet_ai/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
precision = 2

[tool.coverage.html]
directory = "htmlcov" 