    "celery>=5.3.4",
    
    # Web Scraping & Data Collection
    "requests>=2.31.0",
    "httpx>=0.25.2",
    "aiohttp>=3.9.1",
    "beautifulsoup4>=4.12.2",
    "scrapy>=2.11.0",
    "selenium>=4.16.0",
    "playwright>=1.40.0",
    
    # Utilities & Helpers
    "python-dotenv>=1.0.0",
    "typer>=0.9.0",
    "click>=8.1.7",
    "rich>=13.7.0",
    "tqdm>=4.66.1",
    "loguru>=0.7.2",
    
    # Validation & Serialization
    "marshmallow>=3.20.1",
    "jsonschema>=4.20.0",
    
    # Security & Authentication
    "cryptography>=41.0.7",
    "pyjwt>=2.8.0",
    "passlib[bcrypt]>=1.7.4",
    "python-multipart>=0.0.6",
    
    # Monitoring & Observability
    "prometheus-client>=0.19.0",
    "opentelemetry-api>=1.21.0",
    "opentelemetry-sdk>=1.21.0",
    "sentry-sdk[fastapi]>=1.39.2",
    
    # Performance & Optimization
    "numba>=0.58.1",
    "joblib>=1.3.2",
    
    # Specialized ML Libraries
    "xgboost>=2.0.2",
    "lightgbm>=4.1.0",
    "catboost>=1.2.2",
    "optuna>=3.5.0",
    
    # Configuration & Environment
    "python-decouple>=3.8",
    "pyyaml>=6.0.1",
