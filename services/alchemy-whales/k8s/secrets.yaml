# Kubernetes Secret (Base64 encoded)
# IMPORTANT: Replace with actual base64-encoded values
# To encode: echo -n "your-api-key" | base64

apiVersion: v1
kind: Secret
metadata:
  name: alchemy-whales-secrets
  namespace: coinet
type: Opaque
data:
  # Alchemy API Keys (replace with actual base64-encoded keys)
  ALCHEMY_API_KEY_ETH: eW91cl9ldGhlcmV1bV9hcGlfa2V5X2hlcmU=
  ALCHEMY_API_KEY_POLYGON: eW91cl9wb2x5Z29uX2FwaV9rZXlfaGVyZQ==
  ALCHEMY_API_KEY_ARBITRUM: eW91cl9hcmJpdHJ1bV9hcGlfa2V5X2hlcmU=
  ALCHEMY_API_KEY_OPTIMISM: eW91cl9vcHRpbWlzbV9hcGlfa2V5X2hlcmU=
  ALCHEMY_API_KEY_BASE: eW91cl9iYXNlX2FwaV9rZXlfaGVyZQ==
  
  # Database Password
  DATABASE_PASSWORD: eW91cl9kYl9wYXNzd29yZA==
  
  # Redis Password (if required)
  REDIS_PASSWORD: ""
  
  # Webhook Secret
  WEBHOOK_SECRET: eW91cl93ZWJob29rX3NlY3JldA==
  
  # Entity Labeling API Keys (optional)
  ARKHAM_API_KEY: ""
  NANSEN_API_KEY: ""

---
# Example of how to create secrets from files:
# kubectl create secret generic alchemy-whales-secrets \
#   --from-literal=ALCHEMY_API_KEY_ETH='your_key_here' \
#   --from-literal=ALCHEMY_API_KEY_POLYGON='your_key_here' \
#   --from-literal=DATABASE_PASSWORD='your_password' \
#   --namespace=coinet

