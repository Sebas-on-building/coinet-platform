apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alchemy-whales-ingress
  namespace: coinet
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  tls:
  - hosts:
    - whales.coinet.io
    secretName: alchemy-whales-tls
  rules:
  - host: whales.coinet.io
    http:
      paths:
      - path: /webhooks
        pathType: Prefix
        backend:
          service:
            name: alchemy-whales
            port:
              number: 3001
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: alchemy-whales
            port:
              number: 9090
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: alchemy-whales
            port:
              number: 9090

