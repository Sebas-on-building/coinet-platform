apiVersion: apps/v1
kind: Deployment
metadata:
  name: alchemy-whales
  namespace: coinet
  labels:
    app: alchemy-whales
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alchemy-whales
  template:
    metadata:
      labels:
        app: alchemy-whales
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: alchemy-whales
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: alchemy-whales
        image: coinet/alchemy-whales:latest
        imagePullPolicy: Always
        ports:
        - name: webhook
          containerPort: 3001
          protocol: TCP
        - name: health
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        envFrom:
        - configMapRef:
            name: alchemy-whales-config
        - secretRef:
            name: alchemy-whales-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alchemy-whales
  namespace: coinet
  labels:
    app: alchemy-whales
spec:
  type: ClusterIP
  selector:
    app: alchemy-whales
  ports:
  - name: webhook
    port: 3001
    targetPort: webhook
    protocol: TCP
  - name: health
    port: 8080
    targetPort: health
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alchemy-whales
  namespace: coinet
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alchemy-whales-pdb
  namespace: coinet
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: alchemy-whales

