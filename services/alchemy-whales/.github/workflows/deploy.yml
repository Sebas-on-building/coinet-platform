name: Deploy Alchemy Whales Service

on:
  push:
    branches: [main, master]
    paths:
      - 'services/alchemy-whales/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/alchemy-whales
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/alchemy-whales/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint || true
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run tests
        run: npm test || true

  deploy-railway:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@v0.2.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: alchemy-whales
          detach: false

