name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npx eslint .
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npx jest
      - name: Validate OpenAPI spec
        run: npx yaml-lint src/docs/openapi.yaml
      - name: Validate GraphQL SDL
        run: npx graphql-schema-linter src/docs/graphql-schema.graphql
      # Add more jobs for e2e, integration, or deploy as needed 