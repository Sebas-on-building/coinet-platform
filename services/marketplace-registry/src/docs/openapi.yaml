openapi: 3.1.0
info:
  title: Coinet Marketplace API
  version: 1.0.0
  description: |
    The Coinet Marketplace API is atomic, modular, and world-class. It covers all plugin, review, analytics, monetization, and support endpoints, with extensibility and clarity inspired by Apple, Canva, TradingView, and Solana.
servers:
  - url: /api
    description: Local API
  - url: https://api.coinet.com
    description: Production API
security:
  - bearerAuth: []
tags:
  - name: Plugins
    description: Plugin registry, install, uninstall, and details
  - name: Reviews
    description: Plugin reviews and ratings
  - name: Analytics
    description: Plugin analytics and metrics
  - name: Monetization
    description: Pricing, billing, and payouts
  - name: Support
    description: Support features and extensibility
  - name: Organizations
    description: Multi-tenancy and org management
  - name: Users
    description: User management
paths:
  /plugins:
    get:
      tags: [Plugins]
      summary: List plugins
      description: Query all plugins with filters, pagination, and atomic extensibility.
      parameters:
        - in: query
          name: filter
          schema:
            type: string
          description: Filter plugins by tag, status, etc.
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
      responses:
        '200':
          description: List of plugins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plugin'
  /plugins/{pluginId}:
    get:
      tags: [Plugins]
      summary: Get plugin details
      parameters:
        - in: path
          name: pluginId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Plugin details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plugin'
  /plugins/{pluginId}/reviews:
    get:
      tags: [Reviews]
      summary: List reviews for a plugin
      parameters:
        - in: path
          name: pluginId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    post:
      tags: [Reviews]
      summary: Submit a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
  /plugins/{pluginId}/analytics:
    get:
      tags: [Analytics]
      summary: Get plugin analytics
      parameters:
        - in: path
          name: pluginId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Analytics'
  /plugins/{pluginId}/monetization:
    get:
      tags: [Monetization]
      summary: Get monetization info
      parameters:
        - in: path
          name: pluginId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Monetization info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monetization'
  /plugins/{pluginId}/security:
    get:
      tags: [Plugins]
      summary: Get security report
      parameters:
        - in: path
          name: pluginId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Security report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityReport'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Plugin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        description_i18n:
          type: object
        ownerId:
          type: string
        organizationId:
          type: string
        status:
          $ref: '#/components/schemas/PluginStatus'
        tags:
          type: array
          items:
            type: string
        iconUrl:
          type: string
        homepageUrl:
          type: string
        repoUrl:
          type: string
        aiMeta:
          type: object
        meta:
          type: object
        forkedFromId:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/PluginVersion'
        monetization:
          $ref: '#/components/schemas/Monetization'
        analytics:
          $ref: '#/components/schemas/Analytics'
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        security:
          $ref: '#/components/schemas/SecurityReport'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        supportFeatures:
          type: array
          items:
            $ref: '#/components/schemas/PluginSupportFeature'
        supportFeaturesJson:
          type: object
    PluginVersion:
      type: object
      properties:
        id:
          type: string
        pluginId:
          type: string
        version:
          type: string
        changelog:
          type: string
        releaseNotes:
          type: string
        createdAt:
          type: string
          format: date-time
    Monetization:
      type: object
      properties:
        id:
          type: string
        pluginId:
          type: string
        price:
          type: number
        currency:
          type: string
        enabled:
          type: boolean
        meta:
          type: object
    Analytics:
      type: object
      properties:
        id:
          type: string
        pluginId:
          type: string
        installs:
          type: integer
        views:
          type: integer
        meta:
          type: object
    Review:
      type: object
      properties:
        id:
          type: string
        pluginId:
          type: string
        userId:
          type: string
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        sentiment:
          type: string
        status:
          type: string
    ReviewInput:
      type: object
      properties:
        rating:
          type: integer
        comment:
          type: string
    SecurityReport:
      type: object
      properties:
        id:
          type: string
        pluginId:
          type: string
        report:
          type: object
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    PluginSupportFeature:
      type: object
      properties:
        id:
          type: string
        pluginId:
          type: string
        type:
          type: string
        value:
          type: string
        meta:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Billing:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        plan:
          type: string
        status:
          type: string
        renewalDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PluginStatus:
      type: string
      enum: [DRAFT, PUBLISHED, SUSPENDED, ARCHIVED]
    OrgRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, GUEST]
    CollaboratorRole:
      type: string
      enum: [OWNER, ADMIN, EDITOR, VIEWER]
    PluginListingStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, DELISTED]
    MediaType:
      type: string
      enum: [IMAGE, VIDEO, GIF, SVG, OTHER]
    CompatibilityStatus:
      type: string
      enum: [COMPATIBLE, INCOMPATIBLE, PARTIAL, UNKNOWN] 