name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '🛡️ Security'
    labels:
      - 'security'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'maintenance'
  - title: '📝 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🔧 Refactor'
    labels:
      - 'refactor'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
no-changes-template: 'No user-facing changes in this release.'

replacers:
  - search: '/@([a-zA-Z0-9_-]+)/g'
    replace: '[@$1](https://github.com/$1)'

exclude-labels:
  - 'skip-changelog'

sort-direction: ascending

template: |
  ## 🚀 Highlights
  $CHANGES

  ## 📦 Release
  - Version: $RESOLVED_VERSION
  - Date: $DATE

  ## 🛠️ Contributors
  $CONTRIBUTORS 