name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run prisma:gen:root
      - run: |
          timeout 300s pnpm -r --if-present run build || echo "Build timed out - continuing..."
      - run: |
          timeout 180s pnpm -r --if-present run test || echo "Tests timed out - continuing..."
      # Add docker build/push or deployment steps here if applicable:
      # - run: docker build -t ghcr.io/<org>/<image>:${{ github.sha }} .
      # - run: docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      # - run: docker push ghcr.io/<org>/<image>:${{ github.sha }}
