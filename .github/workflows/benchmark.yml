name: Benchmark & Efficiency Tests

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'services/market-prices/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/market-prices/**'
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark type to run'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - compare
          - defi
          - all

env:
  NODE_VERSION: '20'

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/market-prices

    outputs:
      efficiency: ${{ steps.results.outputs.efficiency }}
      cache_hit_rate: ${{ steps.results.outputs.cache_hit_rate }}
      status: ${{ steps.results.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/market-prices/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Quick Benchmark
        if: github.event.inputs.benchmark_type == 'quick' || github.event.inputs.benchmark_type == 'all' || github.event.inputs.benchmark_type == ''
        run: npm run benchmark:quick
        continue-on-error: false

      - name: Run Full Benchmark
        if: github.event.inputs.benchmark_type == 'full' || github.event.inputs.benchmark_type == 'all'
        run: npm run benchmark
        continue-on-error: false

      - name: Run Competitor Comparison
        if: github.event.inputs.benchmark_type == 'compare' || github.event.inputs.benchmark_type == 'all'
        run: npm run benchmark:compare
        continue-on-error: false

      - name: Run DeFi Benchmark
        if: github.event.inputs.benchmark_type == 'defi' || github.event.inputs.benchmark_type == 'all' || github.event_name == 'schedule'
        run: npm run benchmark:defi
        continue-on-error: true

      - name: Train Fallback Model
        if: github.event.inputs.benchmark_type == 'all' || github.event_name == 'schedule'
        run: npm run train:fallback
        continue-on-error: true

      - name: Extract Results
        id: results
        run: |
          # Find latest benchmark result
          LATEST=$(ls -t benchmarks/results/benchmark-*.json 2>/dev/null | head -1)
          
          if [ -n "$LATEST" ]; then
            EFFICIENCY=$(cat "$LATEST" | grep -o '"efficiencyMultiplier": [0-9.]*' | grep -o '[0-9.]*' || echo "0")
            CACHE_HIT=$(cat "$LATEST" | grep -o '"cacheHitRate": [0-9.]*' | grep -o '[0-9.]*' || echo "0")
            STATUS=$(cat "$LATEST" | grep -o '"status": "[^"]*"' | cut -d'"' -f4 || echo "UNKNOWN")
            
            echo "efficiency=$EFFICIENCY" >> $GITHUB_OUTPUT
            echo "cache_hit_rate=$CACHE_HIT" >> $GITHUB_OUTPUT
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          else
            echo "efficiency=0" >> $GITHUB_OUTPUT
            echo "cache_hit_rate=0" >> $GITHUB_OUTPUT
            echo "status=NO_RESULTS" >> $GITHUB_OUTPUT
          fi

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: services/market-prices/benchmarks/results/
          retention-days: 90

      - name: Comment on PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find latest benchmark result
            const resultsDir = 'services/market-prices/benchmarks/results';
            if (!fs.existsSync(resultsDir)) {
              console.log('No results directory found');
              return;
            }
            
            const files = fs.readdirSync(resultsDir)
              .filter(f => f.startsWith('benchmark-'))
              .sort()
              .reverse();
            
            if (files.length === 0) {
              console.log('No benchmark results found');
              return;
            }
            
            const latestFile = path.join(resultsDir, files[0]);
            const results = JSON.parse(fs.readFileSync(latestFile, 'utf8'));
            
            const status = results.status === 'EXCELLENT' ? '✅' : 
                          results.status === 'GOOD' ? '👍' : '⚠️';
            
            const efficiency = results.efficiencyMultiplier || 0;
            const cacheHitRate = results.cacheHitRate || 0;
            const avgLatency = results.avgResponseTimeMs || 0;
            
            const body = `## 📊 Benchmark Results ${status}
            
            | Metric | Value | Target |
            |--------|-------|--------|
            | Efficiency Multiplier | **${efficiency.toFixed(1)}x** | ≥50x |
            | Cache Hit Rate | ${cacheHitRate.toFixed(1)}% | ≥95% |
            | Avg Response Time | ${avgLatency.toFixed(2)}ms | ≤50ms |
            | Status | ${results.status} | EXCELLENT |
            
            ### DeFi Metrics
            ${results.defi ? `
            | Metric | Value |
            |--------|-------|
            | DexScreener Efficiency | ${results.defi.dexscreener?.efficiency || 'N/A'}x |
            | DeFiLlama Efficiency | ${results.defi.defillama?.efficiency || 'N/A'}x |
            | Aggregation Latency | ${results.defi.aggregation?.latencyMs || 'N/A'}ms |
            ` : 'DeFi benchmarks not run in this test.'}
            
            <details>
            <summary>Full Results</summary>
            
            \`\`\`json
            ${JSON.stringify(results, null, 2)}
            \`\`\`
            </details>
            
            ---
            *Benchmark run: ${new Date().toISOString()}*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  defi-benchmark:
    name: DeFi-Specific Benchmarks
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event.inputs.benchmark_type == 'defi' || github.event.inputs.benchmark_type == 'all' || github.event_name == 'schedule'
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/market-prices/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run DexScreener Benchmark
        run: |
          echo "Testing DexScreener API efficiency..."
          npm run benchmark:defi -- --provider=dexscreener
        continue-on-error: true

      - name: Run DeFiLlama Benchmark
        run: |
          echo "Testing DeFiLlama API efficiency..."
          npm run benchmark:defi -- --provider=defillama
        continue-on-error: true

      - name: Run Aggregation Benchmark
        run: |
          echo "Testing unified DeFi aggregation..."
          npm run benchmark:defi -- --type=aggregation
        continue-on-error: true

      - name: Run Sentiment Analysis Benchmark
        run: |
          echo "Testing sentiment analysis accuracy..."
          npm run benchmark:defi -- --type=sentiment
        continue-on-error: true

      - name: Upload DeFi Results
        uses: actions/upload-artifact@v4
        with:
          name: defi-benchmark-results-${{ github.run_id }}
          path: services/market-prices/benchmarks/results/defi/
          retention-days: 90

  efficiency-check:
    name: Efficiency Threshold Check
    runs-on: ubuntu-latest
    needs: benchmark
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Benchmark Results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: services/market-prices/benchmarks/results/

      - name: Check Efficiency Threshold
        run: |
          # Find latest benchmark result
          LATEST=$(ls -t benchmarks/results/benchmark-*.json 2>/dev/null | head -1)
          
          if [ -z "$LATEST" ]; then
            echo "No benchmark results found"
            exit 1
          fi
          
          # Extract metrics
          EFFICIENCY=$(cat "$LATEST" | grep -o '"efficiencyMultiplier": [0-9.]*' | grep -o '[0-9.]*')
          CACHE_HIT=$(cat "$LATEST" | grep -o '"cacheHitRate": [0-9.]*' | grep -o '[0-9.]*')
          
          echo "Efficiency Multiplier: ${EFFICIENCY}x"
          echo "Cache Hit Rate: ${CACHE_HIT}%"
          
          # Check efficiency threshold (50x minimum for production)
          if (( $(echo "$EFFICIENCY >= 50" | bc -l) )); then
            echo "✅ Efficiency check PASSED (${EFFICIENCY}x >= 50x)"
          elif (( $(echo "$EFFICIENCY >= 10" | bc -l) )); then
            echo "⚠️ Efficiency check WARNING (${EFFICIENCY}x >= 10x but < 50x)"
          else
            echo "❌ Efficiency check FAILED (${EFFICIENCY}x < 10x)"
            exit 1
          fi
          
          # Check cache hit rate threshold (90% minimum)
          if (( $(echo "$CACHE_HIT >= 90" | bc -l) )); then
            echo "✅ Cache hit rate check PASSED (${CACHE_HIT}% >= 90%)"
          else
            echo "⚠️ Cache hit rate check WARNING (${CACHE_HIT}% < 90%)"
          fi

      - name: Create Performance Badge
        if: always()
        run: |
          EFFICIENCY="${{ needs.benchmark.outputs.efficiency }}"
          
          # Determine badge color
          if (( $(echo "$EFFICIENCY >= 50" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$EFFICIENCY >= 25" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$EFFICIENCY >= 10" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          echo "Badge: ${EFFICIENCY}x efficiency (${COLOR})"

  security-scan:
    name: Security & Dependency Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/market-prices/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated || true

  build-test:
    name: Build & Type Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/market-prices/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: services/market-prices/dist/
          retention-days: 7
