name: Benchmark & Efficiency Tests

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'services/market-prices/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/market-prices/**'
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark type to run'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - compare
          - all

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/market-prices/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Quick Benchmark
        if: github.event.inputs.benchmark_type == 'quick' || github.event.inputs.benchmark_type == 'all' || github.event.inputs.benchmark_type == ''
        run: npm run benchmark:quick
        continue-on-error: false

      - name: Run Full Benchmark
        if: github.event.inputs.benchmark_type == 'full' || github.event.inputs.benchmark_type == 'all'
        run: npm run benchmark
        continue-on-error: false

      - name: Run Competitor Comparison
        if: github.event.inputs.benchmark_type == 'compare' || github.event.inputs.benchmark_type == 'all'
        run: npm run benchmark:compare
        continue-on-error: false

      - name: Train Fallback Model
        if: github.event.inputs.benchmark_type == 'all' || github.event_name == 'schedule'
        run: npm run train:fallback
        continue-on-error: true

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: services/market-prices/benchmarks/results/
          retention-days: 30

      - name: Comment on PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find latest benchmark result
            const resultsDir = 'services/market-prices/benchmarks/results';
            if (!fs.existsSync(resultsDir)) {
              console.log('No results directory found');
              return;
            }
            
            const files = fs.readdirSync(resultsDir)
              .filter(f => f.startsWith('benchmark-'))
              .sort()
              .reverse();
            
            if (files.length === 0) {
              console.log('No benchmark results found');
              return;
            }
            
            const latestFile = path.join(resultsDir, files[0]);
            const results = JSON.parse(fs.readFileSync(latestFile, 'utf8'));
            
            const status = results.status === 'EXCELLENT' ? '✅' : 
                          results.status === 'GOOD' ? '👍' : '⚠️';
            
            const body = `## 📊 Benchmark Results ${status}
            
            | Metric | Value |
            |--------|-------|
            | Efficiency Multiplier | **${results.efficiencyMultiplier}x** |
            | Cache Hit Rate | ${results.cacheHitRate}% |
            | Avg Response Time | ${results.avgResponseTimeMs}ms |
            | Status | ${results.status} |
            
            <details>
            <summary>Full Results</summary>
            
            \`\`\`json
            ${JSON.stringify(results, null, 2)}
            \`\`\`
            </details>
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  efficiency-check:
    name: Efficiency Threshold Check
    runs-on: ubuntu-latest
    needs: benchmark
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Benchmark Results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: services/market-prices/benchmarks/results/

      - name: Check Efficiency Threshold
        run: |
          # Find latest benchmark result
          LATEST=$(ls -t benchmarks/results/benchmark-*.json 2>/dev/null | head -1)
          
          if [ -z "$LATEST" ]; then
            echo "No benchmark results found"
            exit 1
          fi
          
          # Extract efficiency multiplier
          EFFICIENCY=$(cat "$LATEST" | grep -o '"efficiencyMultiplier": [0-9.]*' | grep -o '[0-9.]*')
          
          echo "Efficiency Multiplier: ${EFFICIENCY}x"
          
          # Check against threshold (10x minimum)
          if (( $(echo "$EFFICIENCY >= 10" | bc -l) )); then
            echo "✅ Efficiency check PASSED (${EFFICIENCY}x >= 10x)"
            exit 0
          else
            echo "❌ Efficiency check FAILED (${EFFICIENCY}x < 10x)"
            exit 1
          fi

  build-test:
    name: Build & Type Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/market-prices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/market-prices/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true

