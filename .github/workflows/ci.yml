name: Coinet AI CI Pipeline
on:
  push:
    branches: [ main, develop, test-ci-pipeline ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_db
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
          echo "Inline debug - pnpm store path: $(pnpm store path)"
        shell: bash
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Debug - Print STORE_PATH
        run: |
          echo "STORE_PATH from pnpm-cache step: ${{ steps.pnpm-cache.outputs.STORE_PATH }}"
      - name: Debug - Show pnpm-lock.yaml before install
        run: |
          echo "--- Contents of pnpm-lock.yaml before install ---"
          cat pnpm-lock.yaml
          echo "--- Contents of package.json (root) before install ---"
          cat package.json
          echo "----------------------------------------------------"
      - run: pnpm install --frozen-lockfile
      - name: Debug - Show git status after install
        run: |
          echo "--- Git status after pnpm install ---"
          git status
          echo "-------------------------------------"
      - run: pnpm run prisma:gen:root
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/ci_db?schema=public'
          POSTGRES_URL: 'postgresql://postgres:postgres@localhost:5432/ci_db?schema=public'
      - run: |
          timeout 30s pnpm run prisma:migrate:root || echo "Migration timed out or failed - continuing..."
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/ci_db?schema=public'
          POSTGRES_URL: 'postgresql://postgres:postgres@localhost:5432/ci_db?schema=public'
      - name: Backend typecheck (BTAR-CI-001 — truthful gate, Option C blocking)
        run: pnpm check:backend
        timeout-minutes: 5
      - name: Build (BTAR-CI-001 — failure-masking removed; multi-package coverage retained)
        run: timeout 300s pnpm -r --if-present run build
      - run: |
          timeout 180s pnpm -r --if-present run test || echo "Tests timed out - continuing..."
      - name: E2E (Playwright)
        if: ${{ hashFiles('**/playwright.config.*') != '' }}
        run: |
          npx playwright install --with-deps
          pnpm -r --if-present run e2e
